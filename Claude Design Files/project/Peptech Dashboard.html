.pt-vt-copy:hover { background: oklch(from var(--pt-fg) l c h / 0.08); color: var(--pt-fg); }

.pt-vt-w-bal { text-align: right; min-width: 0; }
.pt-vt-w-bal-num { font-size: 13px; font-weight: 500; font-variant-numeric: tabular-nums; }
.pt-vt-w-bal-meta { font-size: 10px; color: var(--pt-fg-4); margin-top: 2px; }

.pt-vt-w-actions { display: flex; flex-direction: column; align-items: flex-end; gap: 4px; }
.pt-vt-rotate-warn {
  display: inline-flex; align-items: center; gap: 4px;
  font-size: 9.5px; color: var(--pt-warn);
  text-transform: uppercase; letter-spacing: 0.04em;
}
.pt-vt-rotate-warn i { width: 5px; height: 5px; border-radius: 50%; background: var(--pt-warn); }
.pt-vt-w-btn {
  background: var(--pt-surface); border: 0.5px solid var(--pt-line);
  border-radius: 4px; padding: 3px 8px; font-size: 11px;
  color: var(--pt-fg-2); cursor: pointer; font-family: inherit;
}
.pt-vt-w-btn:hover { background: var(--pt-accent-soft); border-color: var(--pt-accent); color: var(--pt-accent-fg); }

/* ─── Ledger ─── */
.pt-vt-filters { display: flex; gap: 4px; }
.pt-vt-filter {
  background: transparent; border: 0.5px solid transparent;
  padding: 3px 8px; border-radius: 4px;
  font-size: 11px; color: var(--pt-fg-3); cursor: pointer;
  font-family: inherit;
}
.pt-vt-filter:hover { background: var(--pt-bg-side); }
.pt-vt-filter.is-active {
  background: var(--pt-surface); border-color: var(--pt-line);
  color: var(--pt-fg); font-weight: 500;
}

.pt-vt-ledger-body { padding: 0; }
.pt-vt-day-hd {
  font-size: 10px; color: var(--pt-fg-4);
  text-transform: uppercase; letter-spacing: 0.05em; font-weight: 500;
  padding: 10px 14px 6px;
  background: oklch(from var(--pt-bg-side) l c h / 0.5);
  position: sticky; top: 0; z-index: 1;
  border-bottom: 0.5px solid var(--pt-line-soft);
}
.pt-vt-day:first-child .pt-vt-day-hd { border-top: 0; }
.pt-vt-day ul { list-style: none; margin: 0; padding: 0; }

.pt-vt-tx {
  display: grid;
  grid-template-columns: 50px 18px minmax(0, 1fr) auto;
  gap: 10px;
  align-items: center;
  padding: 10px 14px;
  border-top: 0.5px solid var(--pt-line-soft);
}
.pt-vt-day ul li:first-child { border-top: 0; }
.pt-vt-tx:hover { background: var(--pt-bg-side); }

.pt-vt-tx-time { font-size: 10.5px; color: var(--pt-fg-4); }
.pt-vt-tx-arrow {
  width: 18px; height: 18px; border-radius: 50%;
  display: grid; place-items: center;
  font-size: 11px; font-weight: 600;
  flex-shrink: 0;
}
.pt-vt-tx-arrow-in  { background: oklch(from var(--pt-ok) l c h / 0.14); color: var(--pt-ok); }
.pt-vt-tx-arrow-out { background: oklch(from var(--pt-fg) l c h / 0.06); color: var(--pt-fg-3); }
.pt-vt-tx.is-pending .pt-vt-tx-arrow-in {
  background: oklch(from var(--pt-warn) l c h / 0.18); color: var(--pt-warn);
}

.pt-vt-tx-mid { min-width: 0; display: flex; flex-direction: column; gap: 2px; }
.pt-vt-tx-row1 { display: flex; align-items: center; gap: 8px; }
.pt-vt-tx-cp { font-size: 12.5px; font-weight: 500;
  overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
.pt-vt-tx-order {
  font-size: 10.5px; color: var(--pt-fg-3);
  background: oklch(from var(--pt-fg) l c h / 0.05);
  border-radius: 3px; padding: 1px 5px;
}
.pt-vt-tx-row2 { display: flex; align-items: center; gap: 8px; flex-wrap: wrap; }
.pt-vt-tx-hash { font-size: 10px; color: var(--pt-fg-4); }
.pt-vt-tx-note { font-size: 10.5px; color: var(--pt-fg-3); font-style: italic; }
.pt-vt-tx-conf {
  display: inline-flex; align-items: center; gap: 4px;
  font-size: 10px; color: var(--pt-warn);
}
.pt-vt-tx-conf i {
  width: 6px; height: 6px; border-radius: 50%;
  background: var(--pt-warn);
  animation: ptVtPulse 1.4s ease-in-out infinite;
}
@keyframes ptVtPulse {
  0%, 100% { opacity: 1; }
  50%      { opacity: 0.3; }
}

.pt-vt-tx-amt { text-align: right; flex-shrink: 0; }
.pt-vt-tx-amt-num { font-size: 13px; font-weight: 600; font-variant-numeric: tabular-nums; line-height: 1.1; }
.pt-vt-tx-amt-num.is-in  { color: var(--pt-ok); }
.pt-vt-tx-amt-num.is-out { color: var(--pt-fg-2); }
.pt-vt-tx-amt-asset { font-size: 10px; color: var(--pt-fg-4); font-weight: 400; margin-left: 2px; }
.pt-vt-tx-amt-usd { font-size: 10.5px; color: var(--pt-fg-4); margin-top: 1px; }

.pt-vt-empty {
  padding: 32px; text-align: center;
  font-size: 12px; color: var(--pt-fg-4);
}



/* ===== automations.css ===== */
/* automations.css */
.pt-au { height: calc(100vh - 48px); display: flex; flex-direction: column; overflow: hidden; }

.pt-au-hd {
  display: flex; align-items: flex-start; gap: 14px;
  padding: 18px 22px 12px;
  border-bottom: 0.5px solid var(--pt-line);
}
.pt-au-hd > div:first-child { flex: 1; }
.pt-au-hd h1 { font-size: 18px; font-weight: 600; letter-spacing: -0.015em; margin: 0; }
.pt-au-hd p { font-size: 12px; color: var(--pt-fg-3); margin: 2px 0 0; }
.pt-au-hd-actions { display: flex; gap: 8px; }

.pt-au-body {
  flex: 1; min-height: 0;
  display: grid;
  grid-template-columns: minmax(0, 1.05fr) minmax(0, 1.4fr);
  gap: 14px;
  padding: 16px 22px 22px;
  overflow: hidden;
}

/* ─── List ─── */
.pt-au-list-card { display: flex; flex-direction: column; min-height: 0; overflow: hidden; }
.pt-au-list-body { padding: 0; overflow-y: auto; min-height: 0; flex: 1; }
.pt-au-list { list-style: none; margin: 0; padding: 0; }

.pt-au-row {
  display: grid;
  grid-template-columns: 12px minmax(0, 1fr) auto auto;
  gap: 12px;
  align-items: center;
  padding: 12px 14px;
  border-top: 0.5px solid var(--pt-line-soft);
  cursor: pointer;
  transition: background 0.08s;
}
.pt-au-row:first-child { border-top: 0; }
.pt-au-row:hover { background: var(--pt-bg-side); }
.pt-au-row.is-active { background: oklch(from var(--pt-accent) l c h / 0.08); }
.pt-au-row.is-active::before {
  content: ""; position: absolute; left: 0;
}
.pt-au-row.pt-au-state-off  { opacity: 0.55; }
.pt-au-row.pt-au-state-paused { opacity: 0.78; }

.pt-au-dot {
  width: 8px; height: 8px; border-radius: 50%;
  flex-shrink: 0;
}
.pt-au-dot-on {
  background: var(--pt-ok);
  box-shadow: 0 0 0 3px oklch(from var(--pt-ok) l c h / 0.15);
}
.pt-au-dot-paused {
  background: var(--pt-warn);
  box-shadow: 0 0 0 3px oklch(from var(--pt-warn) l c h / 0.15);
}
.pt-au-dot-off {
  background: var(--pt-fg-4);
  box-shadow: 0 0 0 3px oklch(from var(--pt-fg) l c h / 0.05);
}

.pt-au-row-mid { min-width: 0; }
.pt-au-row-name { font-size: 13px; font-weight: 500; letter-spacing: -0.005em; }
.pt-au-row-flow {
  display: flex; align-items: center; gap: 6px;
  font-size: 11px; color: var(--pt-fg-3);
  margin-top: 3px;
  white-space: nowrap;
  overflow: hidden;
  text-overflow: ellipsis;
}
.pt-au-trig {
  background: oklch(from var(--pt-fg) l c h / 0.05);
  border-radius: 3px; padding: 1px 6px;
}
.pt-au-act {
  background: oklch(from var(--pt-accent) l c h / 0.10);
  color: var(--pt-accent-fg);
  border-radius: 3px; padding: 1px 6px;
}
.pt-au-arrow { color: var(--pt-fg-4); font-size: 10px; }

.pt-au-row-meta { text-align: right; }
.pt-au-row-runs { font-size: 13px; font-weight: 500; font-variant-numeric: tabular-nums; }
.pt-au-row-runs span { font-size: 10px; color: var(--pt-fg-4); font-weight: 400; }
.pt-au-row-last { font-size: 10px; color: var(--pt-fg-4); margin-top: 2px; }

/* Toggle */
.pt-au-toggle {
  width: 28px; height: 16px; border-radius: 8px;
  border: 0; padding: 0;
  background: var(--pt-fg-4);
  position: relative;
  cursor: pointer;
  transition: background 0.15s;
  flex-shrink: 0;
}
.pt-au-toggle span {
  position: absolute;
  top: 2px; left: 2px;
  width: 12px; height: 12px;
  border-radius: 50%;
  background: white;
  transition: transform 0.15s;
}
.pt-au-toggle-on { background: var(--pt-ok); }
.pt-au-toggle-on span { transform: translateX(12px); }
.pt-au-toggle-paused { background: var(--pt-warn); }
.pt-au-toggle-paused span { transform: translateX(6px); }
.pt-au-toggle-off { background: oklch(from var(--pt-fg) l c h / 0.20); }

/* ─── Detail ─── */
.pt-au-detail { display: flex; flex-direction: column; min-height: 0; overflow: hidden; }
.pt-au-detail .pt-card-body {
  overflow-y: auto;
  flex: 1;
  display: flex; flex-direction: column;
  padding: 0;
}

.pt-au-d-state { display: flex; align-items: center; }
.pt-au-state-pill {
  display: inline-flex; align-items: center; gap: 6px;
  background: oklch(from var(--pt-fg) l c h / 0.05);
  border-radius: 100px; padding: 3px 10px 3px 8px;
  font-size: 11px; color: var(--pt-fg-2);
  font-weight: 500;
}
.pt-au-state-pill-on     { background: oklch(from var(--pt-ok) l c h / 0.10);   color: var(--pt-ok); }
.pt-au-state-pill-paused { background: oklch(from var(--pt-warn) l c h / 0.10); color: var(--pt-warn); }
.pt-au-state-pill-off    { background: oklch(from var(--pt-fg) l c h / 0.06);   color: var(--pt-fg-3); }

/* Flow */
.pt-au-flow {
  padding: 18px 18px 4px;
  display: flex; flex-direction: column; align-items: stretch;
  gap: 6px;
}

.pt-au-flow-step {
  border: 0.5px solid var(--pt-line);
  border-radius: var(--pt-radius);
  padding: 12px 14px;
  background: var(--pt-bg);
  position: relative;
}
.pt-au-flow-trigger { background: oklch(from var(--pt-fg) l c h / 0.025); }
.pt-au-flow-action  {
  background: oklch(from var(--pt-accent) l c h / 0.04);
  border-color: oklch(from var(--pt-accent) l c h / 0.25);
}

.pt-au-flow-tag {
  font-size: 9.5px;
  text-transform: uppercase;
  letter-spacing: 0.06em;
  color: var(--pt-fg-4);
  font-weight: 600;
  margin-bottom: 4px;
}
.pt-au-flow-action .pt-au-flow-tag { color: var(--pt-accent-fg); }

.pt-au-flow-label { font-size: 13.5px; font-weight: 500; letter-spacing: -0.005em; }
.pt-au-flow-detail { font-size: 11.5px; color: var(--pt-fg-3); margin-top: 3px; }

.pt-au-flow-arrow {
  text-align: center;
  color: var(--pt-fg-4);
  font-size: 14px;
  line-height: 1;
}

.pt-au-conds { list-style: none; margin: 4px 0 0; padding: 0; display: flex; flex-direction: column; gap: 4px; }
.pt-au-conds li {
  display: flex; align-items: center; gap: 8px;
  font-size: 12px; color: var(--pt-fg-2);
  padding: 3px 0;
}
.pt-au-conds li.is-ok    { color: var(--pt-fg-2); }
.pt-au-conds li.is-ok    > svg { color: var(--pt-ok); flex-shrink: 0; }
.pt-au-conds li.is-blocked { color: var(--pt-warn); }
.pt-au-conds li.is-blocked .pt-au-x {
  display: inline-grid; place-items: center;
  width: 11px; height: 11px;
  color: var(--pt-warn);
  font-weight: 700;
  flex-shrink: 0;
}
.pt-au-cond-note { color: var(--pt-fg-4); font-style: italic; font-size: 11px; }

/* Recent runs */
.pt-au-runs {
  border-top: 0.5px solid var(--pt-line);
  margin-top: 8px;
}
.pt-au-runs-hd {
  display: flex; align-items: center; justify-content: space-between;
  padding: 14px 18px 8px;
}
.pt-au-runs-hd h4 { font-size: 12px; font-weight: 600; margin: 0; letter-spacing: -0.005em; }
.pt-au-runs-count { font-size: 11px; color: var(--pt-fg-4); }
.pt-au-runs-empty {
  padding: 18px;
  font-size: 12px; color: var(--pt-fg-4);
  text-align: center;
  font-style: italic;
}

.pt-au-runs-list { list-style: none; margin: 0; padding: 0 0 8px; }
.pt-au-run {
  display: grid;
  grid-template-columns: 80px 8px 110px minmax(0, 1fr);
  gap: 10px;
  align-items: center;
  padding: 7px 18px;
  font-size: 12px;
}
.pt-au-run:hover { background: var(--pt-bg-side); }
.pt-au-run-time { font-size: 10.5px; color: var(--pt-fg-4); }
.pt-au-run-bullet {
  width: 6px; height: 6px; border-radius: 50%;
  background: var(--pt-fg-4);
}
.pt-au-run-bullet-ok    { background: var(--pt-ok); }
.pt-au-run-bullet-warn  { background: var(--pt-warn); }
.pt-au-run-bullet-err   { background: var(--pt-danger); }
.pt-au-run-bullet-skip  { background: var(--pt-fg-4); }
.pt-au-run-bullet-queued{
  background: var(--pt-warn);
  animation: ptVtPulse 1.4s ease-in-out infinite;
}
.pt-au-run-who { font-weight: 500; color: var(--pt-fg); overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
.pt-au-run-action {
  color: var(--pt-fg-3);
  overflow: hidden; text-overflow: ellipsis; white-space: nowrap;
}

.pt-au-run.pt-au-run-warn  .pt-au-run-action { color: var(--pt-warn); }
.pt-au-run.pt-au-run-err   .pt-au-run-action { color: var(--pt-danger); }
.pt-au-run.pt-au-run-skip  .pt-au-run-action { color: var(--pt-fg-4); font-style: italic; }
.pt-au-run.pt-au-run-queued .pt-au-run-action { color: var(--pt-warn); }

/* Footer */
.pt-au-foot {
  border-top: 0.5px solid var(--pt-line);
  padding: 12px 18px;
  display: flex; align-items: center; justify-content: space-between;
  margin-top: auto;
}
.pt-au-foot-stats {
  display: flex; gap: 16px;
  font-size: 11.5px; color: var(--pt-fg-3);
}

      ? keyOrEdits : { [keyOrEdits]: val };
    setValues((prev) => ({ ...prev, ...edits }));
    window.parent.postMessage({ type: '__edit_mode_set_keys', edits }, '*');
  }, []);
  return [values, setTweak];
}

// ── TweaksPanel ─────────────────────────────────────────────────────────────
// Floating shell. Registers the protocol listener BEFORE announcing
// availability — if the announce ran first, the host's activate could land
// before our handler exists and the toolbar toggle would silently no-op.
// The close button posts __edit_mode_dismissed so the host's toolbar toggle
// flips off in lockstep; the host echoes __deactivate_edit_mode back which
// is what actually hides the panel.
function TweaksPanel({ title = 'Tweaks', children }) {
  const [open, setOpen] = React.useState(false);
  const dragRef = React.useRef(null);
  const offsetRef = React.useRef({ x: 16, y: 16 });
  const PAD = 16;

  const clampToViewport = React.useCallback(() => {
    const panel = dragRef.current;
    if (!panel) return;
    const w = panel.offsetWidth, h = panel.offsetHeight;
    const maxRight = Math.max(PAD, window.innerWidth - w - PAD);
    const maxBottom = Math.max(PAD, window.innerHeight - h - PAD);
    offsetRef.current = {
      x: Math.min(maxRight, Math.max(PAD, offsetRef.current.x)),
      y: Math.min(maxBottom, Math.max(PAD, offsetRef.current.y)),
    };
    panel.style.right = offsetRef.current.x + 'px';
    panel.style.bottom = offsetRef.current.y + 'px';
  }, []);

  React.useEffect(() => {
    if (!open) return;
    clampToViewport();
    if (typeof ResizeObserver === 'undefined') {
      window.addEventListener('resize', clampToViewport);
      return () => window.removeEventListener('resize', clampToViewport);
    }
    const ro = new ResizeObserver(clampToViewport);
    ro.observe(document.documentElement);
    return () => ro.disconnect();
  }, [open, clampToViewport]);

  React.useEffect(() => {
    const onMsg = (e) => {
      const t = e?.data?.type;
      if (t === '__activate_edit_mode') setOpen(true);
      else if (t === '__deactivate_edit_mode') setOpen(false);
    };
    window.addEventListener('message', onMsg);
    window.parent.postMessage({ type: '__edit_mode_available' }, '*');
    return () => window.removeEventListener('message', onMsg);
  }, []);

  const dismiss = () => {
    setOpen(false);
    window.parent.postMessage({ type: '__edit_mode_dismissed' }, '*');
  };

  const onDragStart = (e) => {
    const panel = dragRef.current;
    if (!panel) return;
    const r = panel.getBoundingClientRect();
    const sx = e.clientX, sy = e.clientY;
    const startRight = window.innerWidth - r.right;
    const startBottom = window.innerHeight - r.bottom;
    const move = (ev) => {
      offsetRef.current = {
        x: startRight - (ev.clientX - sx),
        y: startBottom - (ev.clientY - sy),
      };
      clampToViewport();
    };
    const up = () => {
      window.removeEventListener('mousemove', move);
      window.removeEventListener('mouseup', up);
    };
    window.addEventListener('mousemove', move);
    window.addEventListener('mouseup', up);
  };

  if (!open) return null;
  return (
    <>
      <style>{__TWEAKS_STYLE}</style>
      <div ref={dragRef} className="twk-panel"
           style={{ right: offsetRef.current.x, bottom: offsetRef.current.y }}>
        <div className="twk-hd" onMouseDown={onDragStart}>
          <b>{title}</b>
          <button className="twk-x" aria-label="Close tweaks"
                  onMouseDown={(e) => e.stopPropagation()}
                  onClick={dismiss}>✕</button>
        </div>
        <div className="twk-body">{children}</div>
      </div>
    </>
  );
}

// ── Layout helpers ──────────────────────────────────────────────────────────

function TweakSection({ label, children }) {
  return (
    <>
      <div className="twk-sect">{label}</div>
      {children}
    </>
  );
}

function TweakRow({ label, value, children, inline = false }) {
  return (
    <div className={inline ? 'twk-row twk-row-h' : 'twk-row'}>
      <div className="twk-lbl">
        <span>{label}</span>
        {value != null && <span className="twk-val">{value}</span>}
      </div>
      {children}
    </div>
  );
}

// ── Controls ────────────────────────────────────────────────────────────────

function TweakSlider({ label, value, min = 0, max = 100, step = 1, unit = '', onChange }) {
  return (
    <TweakRow label={label} value={`${value}${unit}`}>
      <input type="range" className="twk-slider" min={min} max={max} step={step}
             value={value} onChange={(e) => onChange(Number(e.target.value))} />
    </TweakRow>
  );
}

function TweakToggle({ label, value, onChange }) {
  return (
    <div className="twk-row twk-row-h">
      <div className="twk-lbl"><span>{label}</span></div>
      <button type="button" className="twk-toggle" data-on={value ? '1' : '0'}
              role="switch" aria-checked={!!value}
              onClick={() => onChange(!value)}><i /></button>
    </div>
  );
}

function TweakRadio({ label, value, options, onChange }) {
  const trackRef = React.useRef(null);
  const [dragging, setDragging] = React.useState(false);
  const opts = options.map((o) => (typeof o === 'object' ? o : { value: o, label: o }));
  const idx = Math.max(0, opts.findIndex((o) => o.value === value));
  const n = opts.length;

  // The active value is read by pointer-move handlers attached for the lifetime
  // of a drag — ref it so a stale closure doesn't fire onChange for every move.
  const valueRef = React.useRef(value);
  valueRef.current = value;

  const segAt = (clientX) => {
    const r = trackRef.current.getBoundingClientRect();
    const inner = r.width - 4;
    const i = Math.floor(((clientX - r.left - 2) / inner) * n);
    return opts[Math.max(0, Math.min(n - 1, i))].value;
  };

  const onPointerDown = (e) => {
    setDragging(true);
    const v0 = segAt(e.clientX);
    if (v0 !== valueRef.current) onChange(v0);
    const move = (ev) => {
      if (!trackRef.current) return;
      const v = segAt(ev.clientX);
      if (v !== valueRef.current) onChange(v);
    };
    const up = () => {
      setDragging(false);
      window.removeEventListener('pointermove', move);
      window.removeEventListener('pointerup', up);
    };
    window.addEventListener('pointermove', move);
    window.addEventListener('pointerup', up);
  };

  return (
    <TweakRow label={label}>
      <div ref={trackRef} role="radiogroup" onPointerDown={onPointerDown}
           className={dragging ? 'twk-seg dragging' : 'twk-seg'}>
        <div className="twk-seg-thumb"
             style={{ left: `calc(2px + ${idx} * (100% - 4px) / ${n})`,
                      width: `calc((100% - 4px) / ${n})` }} />
        {opts.map((o) => (
          <button key={o.value} type="button" role="radio" aria-checked={o.value === value}>
            {o.label}
          </button>
        ))}
      </div>
    </TweakRow>
  );
}

function TweakSelect({ label, value, options, onChange }) {
  return (
    <TweakRow label={label}>
      <select className="twk-field" value={value} onChange={(e) => onChange(e.target.value)}>
        {options.map((o) => {
          const v = typeof o === 'object' ? o.value : o;
          const l = typeof o === 'object' ? o.label : o;
          return <option key={v} value={v}>{l}</option>;
        })}
      </select>
    </TweakRow>
  );
}

function TweakText({ label, value, placeholder, onChange }) {
  return (
    <TweakRow label={label}>
      <input className="twk-field" type="text" value={value} placeholder={placeholder}
             onChange={(e) => onChange(e.target.value)} />
    </TweakRow>
  );
}

function TweakNumber({ label, value, min, max, step = 1, unit = '', onChange }) {
  const clamp = (n) => {
    if (min != null && n < min) return min;
    if (max != null && n > max) return max;
    return n;
  };
  const startRef = React.useRef({ x: 0, val: 0 });
  const onScrubStart = (e) => {
    e.preventDefault();
    startRef.current = { x: e.clientX, val: value };
    const decimals = (String(step).split('.')[1] || '').length;
    const move = (ev) => {
      const dx = ev.clientX - startRef.current.x;
      const raw = startRef.current.val + dx * step;
      const snapped = Math.round(raw / step) * step;
      onChange(clamp(Number(snapped.toFixed(decimals))));
    };
    const up = () => {
      window.removeEventListener('pointermove', move);
      window.removeEventListener('pointerup', up);
    };
    window.addEventListener('pointermove', move);
    window.addEventListener('pointerup', up);
  };
  return (
    <div className="twk-num">
      <span className="twk-num-lbl" onPointerDown={onScrubStart}>{label}</span>
      <input type="number" value={value} min={min} max={max} step={step}
             onChange={(e) => onChange(clamp(Number(e.target.value)))} />
      {unit && <span className="twk-num-unit">{unit}</span>}
    </div>
  );
}

function TweakColor({ label, value, onChange }) {
  return (
    <div className="twk-row twk-row-h">
      <div className="twk-lbl"><span>{label}</span></div>
      <input type="color" className="twk-swatch" value={value}
             onChange={(e) => onChange(e.target.value)} />
    </div>
  );
}

function TweakButton({ label, onClick, secondary = false }) {
  return (
    <button type="button" className={secondary ? 'twk-btn secondary' : 'twk-btn'}
            onClick={onClick}>{label}</button>
  );
}

Object.assign(window, {
  useTweaks, TweaksPanel, TweakSection, TweakRow,
  TweakSlider, TweakToggle, TweakRadio, TweakSelect,
  TweakText, TweakNumber, TweakColor, TweakButton,
});

            {k.delta != null && (
              <span className={`pt-kpi-delta ${k.delta >= 0 ? "up" : "dn"}`}>
                {k.delta >= 0 ? "▲" : "▼"} {Math.abs(k.delta)}%
              </span>
            )}
            {k.spark && <PtSpark data={k.spark} />}
          </div>
          {k.sub && <div className="pt-kpi-sub">{k.sub}</div>}
        </div>
      ))}
    </div>

function PtSpark({ data }) {
  const max = Math.max(...data), min = Math.min(...data);
  const w = 56, h = 18;
  const pts = data.map((v, i) => {
    const x = (i / (data.length - 1)) * w;
    const y = h - ((v - min) / Math.max(1, max - min)) * h;
    return `${x.toFixed(1)},${y.toFixed(1)}`;
  }).join(" ");
  return (
    <svg width={w} height={h} viewBox={`0 0 ${w} ${h}`} className="pt-spark">
      <polyline points={pts} fill="none" stroke="var(--pt-accent)" strokeWidth="1.25"
                strokeLinecap="round" strokeLinejoin="round"/>
    </svg>
  );
}

function fmtMins(m) {
  if (m < 60) return `${m}m`;
  if (m < 60 * 24) return `${Math.floor(m/60)}h`;
  return `${Math.floor(m/60/24)}d`;
}

function PtTrust({ score, compact }) {
  const cls = score >= 85 ? "hi" : score >= 65 ? "md" : "lo";
  if (compact) return <div className={`pt-trust-pill pt-trust-${cls}`}>{score}</div>;
  return (
    <div className={`pt-trust pt-trust-${cls}`}>
      <div className="pt-trust-num">{score}</div>
      <div className="pt-trust-lbl">trust</div>
    </div>
  );
}

function PtConversation({ thread, messages, onSend }) {
  const [draft, setDraft] = React.useState("");

  const scrollRef = React.useRef(null);

  React.useEffect(() => {
    if (scrollRef.current) scrollRef.current.scrollTop = scrollRef.current.scrollHeight;
  }, [thread.id, messages.length]);

  const send = () => {
    const text = draft.trim();
    if (!text) return;
    setSending(true);
    onSend(thread.id, text);

function PtComposer({ thread, draft, setDraft, onSend, sending }) {
  const taRef = React.useRef(null);

    if (e.key === "Enter" && (e.metaKey || e.ctrlKey)) { e.preventDefault(); onSend(); }

  const insertQR = (id) => {
    const text = window.PT_QUICK_TEXT[id] || "";
    if (!text) return;
    setDraft((d) => d ? d + "\n\n" + text : text);
    setTimeout(() => taRef.current && taRef.current.focus(), 0);
  };

  return (
    <div className="pt-ix-composer">
      <div className="pt-quicks pt-quicks-bar">
        <span className="pt-quicks-lbl">Quick</span>
        {window.PT_QUICK_REPLIES.slice(0, 5).map((q) => (

            {q.label}
          </button>
        ))}

      </div>
      <div className="pt-composer-field">
        <textarea
          ref={taRef}
          value={draft}

          onKeyDown={onKey}
          placeholder={`Message ${thread.name} via ${({wa:"WhatsApp",tg:"Telegram",em:"Email"})[thread.channel]}…`}
          rows={3}

            <span>Live preview</span>
            <span className="pt-bc-preview-meta mono">{finalCount} × {chCount}ch</span>
          </div>

          {channels.wa && <PtBcPreviewBubble channel="wa" name="K. (gymrat_84)" body={body} merge={{first_name:"K.",last_order:"11d"}} />}
          {channels.tg && <PtBcPreviewBubble channel="tg" name="marcus_r" body={body} merge={{first_name:"marcus",last_order:"3d"}} />}
          {channels.em && <PtBcPreviewBubble channel="em" name="Dani V." body={body} merge={{first_name:"Dani",last_order:"—"}} />}
          {!channels.wa && !channels.tg && !channels.em && (
            <div className="pt-bc-preview-empty">Pick a channel to preview</div>
          )}

          <div className="pt-bc-summary">
            <div className="pt-bc-summary-row">
              <span className="lbl">Recipients</span>
              <span className="val mono">{finalCount}</span>
            </div>
            <div className="pt-bc-summary-row">
              <span className="lbl">Channels</span>
              <span className="val">{[channels.wa && "WA", channels.tg && "TG", channels.em && "EM"].filter(Boolean).join(" + ") || "—"}</span>
            </div>
            <div className="pt-bc-summary-row">
              <span className="lbl">Delivery</span>
              <span className="val">{scheduleMode === "now" ? (stagger ? `~${Math.ceil(finalCount * 8 / 60)}m` : "burst") : scheduleMode}</span>
            </div>
            <div className="pt-bc-summary-row">
              <span className="lbl">Risk</span>
              <span className="val pt-bc-risk-low"><i className="pt-dot pt-dot-ok"/> low</span>
            </div>
            <button className="pt-btn pt-btn-primary pt-bc-send" onClick={send} disabled={!body.trim() || finalCount === 0 || chCount === 0}>
              <window.I.send size={12}/> {scheduleMode === "now" ? `Send to ${finalCount}` : `Schedule ${finalCount}`}
            </button>
            <div className="pt-bc-warn">For research-use comms only. No medical claims.</div>
          </div>
        </aside>
      </div>
    </div>
  );
}

function PtBcPreviewBubble({ channel, name, body, merge }) {
  const Ch = window.I[channel];
  const channelName = ({ wa: "WhatsApp", tg: "Telegram", em: "Email" })[channel];
  const merged = body
    .replace(/\{\{first_name\}\}/g, merge.first_name)
    .replace(/\{\{last_order\}\}/g, merge.last_order);
  return (
    <div className={`pt-bc-prev pt-ix-${channel}`}>
      <div className="pt-bc-prev-hd">
        <Ch size={11}/>
        <span className="pt-bc-prev-ch">{channelName}</span>
        <span className="pt-bc-prev-to">→ {name}</span>
      </div>
      <div className="pt-bubble pt-bubble-me">
        <div className="pt-bubble-text">{merged || "—"}</div>
        <div className="pt-bubble-meta">just now · sending…</div>
      </div>
    </div>
  );
}

const PT_COLUMNS = [
  { id: "awaiting",   label: "Awaiting payment", caption: "Invoice sent · waiting for tx",       gateAfter: true  },
  { id: "confirming", label: "Confirming",       caption: "Tx seen · waiting for N confirms",   gateAfter: true  },
  { id: "packing",    label: "Packing",          caption: "Paid · ready to ship",               gateAfter: false },
  { id: "shipped",    label: "Shipped",          caption: "In transit",                          gateAfter: false },
  { id: "delivered",  label: "Delivered",        caption: "Closed",                              gateAfter: false },
];

function PtOrdersView() {
  const [orders, setOrders] = React.useState(PT_ORDERS);
  const [dragId, setDragId] = React.useState(null);
  const [dragOverCol, setDragOverCol] = React.useState(null);
  const [pulse, setPulse] = React.useState({});  // id → 'ok' | 'err'
  const [toast, setToast] = React.useState(null);

  // Confirmations tick up over time for confirming orders (slow — chain time)
  React.useEffect(() => {
    const t = setInterval(() => {
      setOrders((prev) => {
        // Pick ONE under-confirmed order to advance, so ticks feel staggered
        const candidates = prev.filter((o) => o.state === "confirming" && o.confirms < o.needs);
        if (candidates.length === 0) return prev;
        const target = candidates[Math.floor(Math.random() * candidates.length)];
        return prev.map((o) => o.id === target.id ? { ...o, confirms: o.confirms + 1 } : o);
      });
    }, 6500);
    return () => clearInterval(t);
  }, []);

  const showToast = (text, kind = "ok") => {
    setToast({ text, kind, id: Date.now() });
    setTimeout(() => setToast(null), 2400);
  };

  const flash = (id, kind) => {
    setPulse((p) => ({ ...p, [id]: kind }));
    setTimeout(() => setPulse((p) => { const n = { ...p }; delete n[id]; return n; }), 700);
  };

  const tryMove = (orderId, toState) => {
    const o = orders.find((x) => x.id === orderId);
    if (!o || o.state === toState) return;

    // Crypto-confirmation gate: confirming → packing requires confirms >= needs
    if (o.state === "confirming" && toState !== "confirming" && o.state !== toState) {
      if (toState === "awaiting") {
        // Allow rolling back
      } else if (toState === "packing" || toState === "shipped" || toState === "delivered") {
        if ((o.confirms || 0) < (o.needs || 0)) {
          flash(orderId, "err");
          showToast(`#${orderId} blocked — ${o.confirms}/${o.needs} confirmations`, "err");
          return;
        }
      }
    }

    // Awaiting can't skip directly to packing without payment
    if (o.state === "awaiting" && (toState === "packing" || toState === "shipped" || toState === "delivered")) {
      flash(orderId, "err");
      showToast(`#${orderId} blocked — no payment received yet`, "err");
      return;
    }

    setOrders((prev) => prev.map((x) => x.id === orderId ? { ...x, state: toState } : x));
    flash(orderId, "ok");
    showToast(`#${orderId} → ${PT_COLUMNS.find((c) => c.id === toState).label}`);
  };

  const onDragStart = (e, id) => {
    setDragId(id);
    e.dataTransfer.effectAllowed = "move";
    try { e.dataTransfer.setData("text/plain", id); } catch (err) {}
  };
  const onDragEnd = () => { setDragId(null); setDragOverCol(null); };

  const columnCounts = PT_COLUMNS.reduce((acc, c) => {
    acc[c.id] = orders.filter((o) => o.state === c.id).length;
    return acc;
  }, {});

  const totalAwaiting = orders.filter((o) => o.state === "awaiting" || o.state === "confirming")
    .reduce((s, o) => s + o.amt, 0);
  const inFlight = orders.filter((o) => o.state === "shipped").length;

  return (
    <div className="pt-or" data-screen-label="Orders">
      <div className="pt-or-hd">
        <div>
          <h1>Orders</h1>
          <p>{orders.length} open · ${totalAwaiting.toLocaleString()} awaiting payment · {inFlight} in transit</p>
        </div>
        <div className="pt-or-hd-actions">
          <div className="pt-or-search">
            <window.I.search size={12}/>
            <input placeholder="Search by # or customer…"/>
          </div>
          <button className="pt-btn pt-btn-ghost"><window.I.filter size={12}/> Filter</button>
          <button className="pt-btn pt-btn-ghost"><window.I.box size={12}/> Print labels (3)</button>
          <button className="pt-btn pt-btn-primary"><window.I.plus size={12}/> New order</button>
        </div>
      </div>

      <div className="pt-or-board">
        {PT_COLUMNS.map((col) => {
          const colOrders = orders.filter((o) => o.state === col.id);
          const isOver = dragOverCol === col.id && dragId;
          const draggedOrder = dragId ? orders.find((o) => o.id === dragId) : null;
          const wouldBeBlocked = draggedOrder && (
            (draggedOrder.state === "awaiting" && (col.id === "packing" || col.id === "shipped" || col.id === "delivered")) ||
            (draggedOrder.state === "confirming" && (col.id === "packing" || col.id === "shipped" || col.id === "delivered") &&
              (draggedOrder.confirms || 0) < (draggedOrder.needs || 0))
          );

          return (
            <div
              key={col.id}
              className={`pt-or-col ${isOver ? "is-over" : ""} ${isOver && wouldBeBlocked ? "is-blocked" : ""}`}
              onDragOver={(e) => { e.preventDefault(); setDragOverCol(col.id); }}
              onDragLeave={(e) => { if (e.currentTarget === e.target) setDragOverCol(null); }}
              onDrop={(e) => {
                e.preventDefault();
                const id = dragId || (e.dataTransfer && e.dataTransfer.getData("text/plain"));
                if (id) tryMove(id, col.id);
                setDragId(null);
                setDragOverCol(null);
              }}
            >
              <div className="pt-or-col-hd" data-col={col.id}>
                <div className="pt-or-col-titlewrap">
                  <span className={`pt-or-col-dot pt-or-dot-${col.id}`}/>
                  <span className="pt-or-col-title">{col.label}</span>
                  <span className="pt-or-col-count mono">{columnCounts[col.id]}</span>
                </div>
                <div className="pt-or-col-cap">{col.caption}</div>
              </div>

              <div className="pt-or-col-body">
                {colOrders.map((o) => (
                  <PtOrderCard
                    key={o.id}
                    order={o}
                    pulse={pulse[o.id]}
                    onDragStart={onDragStart}
                    onDragEnd={onDragEnd}
                    onAdvance={tryMove}
                    isDragging={dragId === o.id}
                  />
                ))}
                {colOrders.length === 0 && (
                  <div className="pt-or-col-empty">— nothing here —</div>
                )}
              </div>
            </div>
          );
        })}
      </div>

      {toast && (
        <div className={`pt-or-toast pt-or-toast-${toast.kind}`} key={toast.id}>
          {toast.kind === "err" ? <window.I.x size={12}/> : <window.I.check size={12}/>}
          <span>{toast.text}</span>
        </div>
      )}
    </div>
  );
}

function PtOrderCard({ order: o, pulse, onDragStart, onDragEnd, onAdvance, isDragging }) {
  const Ch = window.I[o.channel];
  const initials = (o.cust.match(/[A-Z]/g) || [o.cust[0]]).slice(0,2).join("");
  const confirmPct = o.state === "confirming" ? (o.confirms / o.needs) : 0;
  const confirmReady = o.state === "confirming" && o.confirms >= o.needs;
  const nextState = {
    awaiting: null, // can't advance without payment
    confirming: confirmReady ? "packing" : null,
    packing: "shipped",
    shipped: "delivered",
    delivered: null,
  }[o.state];
  const nextLabel = {
    packing:   "Confirm payment →",
    shipped:   "Mark packed →",
    delivered: "Mark delivered →",
  };

  return (
    <article
      className={`pt-or-card pt-or-card-${o.state} ${pulse ? `pt-or-pulse-${pulse}` : ""} ${isDragging ? "is-dragging" : ""}`}
      draggable
      onDragStart={(e) => onDragStart(e, o.id)}
      onDragEnd={onDragEnd}
    >
      <header className="pt-or-card-hd">
        <span className="pt-or-card-id mono">#{o.id}</span>
        <span className="pt-or-card-age mono">{o.age}</span>
      </header>

      <div className="pt-or-card-cust">
        <div className="pt-or-card-av" data-channel={o.channel}>
          <span>{initials}</span>
          <i className={`pt-thread-ch pt-ch-${o.channel}`}><Ch size={8}/></i>
        </div>
        <div className="pt-or-card-name">{o.cust}</div>
      </div>

      <div className="pt-or-card-items">{o.items}</div>

      <div className="pt-or-card-pay">
        <span className="pt-pay-asset" data-asset={o.asset}>{o.asset}</span>
        <span className="pt-or-card-amt mono">${o.amt}</span>
      </div>

      {/* State-specific footer */}
      {o.state === "awaiting" && (
        <div className="pt-or-card-state pt-or-state-await">
          <window.I.clock size={11}/>
          <span>invoice sent {o.invoiced}</span>
        </div>
      )}

      {o.state === "confirming" && (
        <div className="pt-or-card-confirm">
          <div className="pt-or-confirm-row">
            <span className="pt-or-confirm-tx mono">{o.txHash}</span>
            <span className="pt-or-confirm-ct mono">{o.confirms}/{o.needs}</span>
          </div>
          <div className="pt-or-confirm-bar">
            {Array.from({length: o.needs}).map((_, i) => (
              <span key={i} className={`pt-or-confirm-tick ${i < o.confirms ? "is-on" : ""} ${confirmReady ? "is-ready" : ""}`}/>
            ))}
          </div>
          <div className="pt-or-confirm-cap">
            {confirmReady
              ? <><window.I.check size={11}/> ready to advance</>
              : <>waiting · ~{Math.max(1, (o.needs - o.confirms) * 2)}m</>}
          </div>
        </div>
      )}

      {o.state === "packing" && (
        <div className="pt-or-card-state pt-or-state-pack">
          <window.I.box size={11}/>
          <span>batch {o.batch}</span>
        </div>
      )}

      {o.state === "shipped" && (
        <div className="pt-or-card-state pt-or-state-ship">
          <window.I.truck size={11}/>
          <span>{o.carrier} · ETA {o.eta}</span>
        </div>
      )}

      {o.state === "delivered" && (
        <div className="pt-or-card-state pt-or-state-done">
          <window.I.check size={11}/>
          <span>delivered {o.deliveredAt}</span>
        </div>
      )}

      {nextState && (
        <button
          className="pt-or-advance"
          onClick={() => onAdvance(o.id, nextState)}
        >
          {nextLabel[nextState] || `→ ${nextState}`}
        </button>
      )}
    </article>
  );
}

function PtSparkline({ data, w = 60, h = 16 }) {
  const max = Math.max(...data, 1);
  const step = w / (data.length - 1);
  const pts = data.map((v, i) => `${(i*step).toFixed(1)},${(h - (v/max)*h).toFixed(1)}`).join(" ");
  const area = `0,${h} ${pts} ${w},${h}`;
  return (
    <svg className="pt-cat-spark" viewBox={`0 0 ${w} ${h}`} width={w} height={h}>
      <polygon points={area} fill="var(--pt-accent-soft)" stroke="none"/>
      <polyline points={pts} fill="none" stroke="var(--pt-accent)" strokeWidth="1.2" strokeLinejoin="round"/>
    </svg>
  );
}

function PtCatalogDetail({ product: p }) {

  const totalBatchQty = p.batches.reduce((s, b) => s + b.qty, 0);
  const totalBatchSold = p.batches.reduce((s, b) => s + b.sold, 0);

  return (
    <aside className="pt-cat-detail">
      <header className="pt-cat-detail-hd">
        <div>
          <span className="pt-cat-cat-pill" data-cat={p.category}>{p.category}</span>

          <div className="pt-cat-sku mono">{p.sku}</div>

        <div className="pt-cat-detail-actions">

          <button className="pt-btn pt-btn-primary">Re-order</button>
        </div>
      </header>

      {p.note && (
        <div className={`pt-cat-note ${p.flag ? `pt-cat-note-${p.flag}` : ""}`}>
          {p.flag && <i className="pt-cat-note-dot"/>}
          <span>{p.note}</span>
        </div>
      )}

      <div className="pt-cat-stat-grid">
        <div className="pt-cat-stat">
          <div className="lbl">In stock</div>
          <div className="val mono">{p.stock}<span className="u">vials</span></div>
          <div className="pt-cat-stock-bar">
            <div className={`pt-cat-stock-fill ${p.flag ? `is-${p.flag}` : ""}`} style={{ width: `${stockPct*100}%` }}/>
            <div className="pt-cat-stock-thr" style={{ left: `${Math.min(100, p.threshold/(p.threshold*2)*100)}%` }}/>
          </div>
          <div className="pt-cat-stat-sub">threshold {p.threshold}</div>
        </div>
        <div className="pt-cat-stat">
          <div className="lbl">Velocity</div>
          <div className="val mono">{p.velocityWk}<span className="u">/wk</span></div>
          <PtSparkline data={p.demand7d} w={120} h={22}/>
          <div className="pt-cat-stat-sub">last 7 days</div>
        </div>
        <div className="pt-cat-stat">
          <div className="lbl">Cover</div>
          <div className={`val mono ${p.daysCover < 14 ? "is-warn" : ""} ${p.daysCover === 0 ? "is-zero" : ""}`}>
            {p.daysCover === 0 ? "—" : p.daysCover}<span className="u">days</span>
          </div>
          <div className="pt-cat-stat-sub">at current velocity</div>
        </div>
        <div className="pt-cat-stat">
          <div className="lbl">Unit econ</div>
          <div className="val mono">${p.price}</div>
          <div className="pt-cat-stat-sub">cost ${p.cost} · margin {Math.round(p.margin*100)}%</div>
        </div>
      </div>

      <section className="pt-card pt-cat-section">
        <header className="pt-card-hd">
          <div>
            <h3>Batches</h3>
            <p>{p.batches.length} on shelf · {totalBatchSold}/{totalBatchQty} sold</p>
          </div>
          <button className="pt-link">Re-order →</button>
        </header>
        <div className="pt-card-body">
          {p.batches.length === 0 ? (
            <div className="pt-cat-empty">
              <span>No active batch.</span>
              <button className="pt-btn pt-btn-ghost">Mark restocked</button>
            </div>
          ) : (
            <table className="pt-cat-batches">
              <thead>
                <tr><th>Lot</th><th>Made</th><th>Sold</th><th>Purity</th><th>COA</th><th></th></tr>
              </thead>
              <tbody>
                {p.batches.map((b) => {
                  const pct = b.sold / b.qty;
                  return (
                    <tr key={b.id}>
                      <td className="mono">{b.id}</td>
                      <td>{b.made}</td>
                      <td>
                        <div className="pt-cat-batch-sold">
                          <span className="mono">{b.sold}/{b.qty}</span>
                          <div className="pt-cat-batch-bar">
                            <div className="pt-cat-batch-fill" style={{ width: `${pct*100}%` }}/>
                          </div>
                        </div>
                      </td>
                      <td className="mono">{b.purity}%</td>
                      <td>{b.coa
                        ? <span className="pt-cat-coa is-on"><window.I.check size={10}/> Janoshik</span>
                        : <span className="pt-cat-coa">—</span>}</td>
                      <td><button className="pt-link">View →</button></td>
                    </tr>
                  );
                })}
              </tbody>
            </table>
          )}
        </div>
      </section>

      <section className="pt-card pt-cat-section">
        <header className="pt-card-hd">
          <div>
            <h3>Often paired with</h3>
            <p>Customers buying {p.sku} also buy</p>
          </div>
        </header>
        <div className="pt-card-body pt-cat-affinity-body">
          {p.affinity.map((sku) => {
            const ap = PT_CATALOG.find((x) => x.sku === sku);
            if (!ap) return null;
            return (
              <div key={sku} className="pt-cat-aff">
                <span className="pt-cat-cat-pill" data-cat={ap.category}>{ap.category}</span>
                <div>
                  <div className="pt-cat-aff-name">{ap.name}</div>
                  <div className="pt-cat-aff-sub mono">{ap.sku} · ${ap.price}</div>
                </div>
                <span className={`pt-cat-aff-stock ${ap.flag ? "is-low" : ""} mono`}>{ap.stock}</span>
              </div>
            );
          })}
        </div>
      </section>
    </aside>
  );
}

function PtBalanceCard({ data: b, isActive, onClick }) {
  const max = Math.max(...b.spark);
  const min = Math.min(...b.spark);
  const range = max - min || 1;
  const w = 100, h = 24;
  const step = w / (b.spark.length - 1);
  const pts = b.spark.map((v, i) => `${(i*step).toFixed(1)},${(h - ((v - min) / range) * (h - 2) - 1).toFixed(1)}`).join(" ");
  const deltaPct = (b.delta24h / (b.balanceUsd - b.delta24h)) * 100;

  return (
    <button className={`pt-vt-bal ${isActive ? "is-active" : ""}`} onClick={onClick}>
      <div className="pt-vt-bal-hd">
        <span className="pt-pay-asset" data-asset={b.asset}>{b.asset}</span>
        <span className="pt-vt-bal-chain">{b.chain}</span>
      </div>
      <div className="pt-vt-bal-num mono">
        {b.balance.toLocaleString(undefined, { maximumFractionDigits: b.decimals })}
        <span> {b.asset === "Cash" ? "USD" : b.asset}</span>
      </div>
      <div className="pt-vt-bal-usd mono">≈ ${Math.round(b.balanceUsd).toLocaleString()}</div>
      <div className="pt-vt-bal-foot">
        <span className={`pt-vt-bal-delta ${b.delta24h >= 0 ? "is-up" : "is-down"} mono`}>
          {b.delta24h >= 0 ? "▲" : "▼"} {b.delta24h >= 0 ? "+" : ""}{b.delta24h.toLocaleString(undefined, { maximumFractionDigits: 0 })}
          <span className="pt-vt-bal-delta-pct">({deltaPct >= 0 ? "+" : ""}{deltaPct.toFixed(1)}%)</span>
        </span>
        <svg className="pt-vt-bal-spark" viewBox={`0 0 ${w} ${h}`} width={w} height={h} preserveAspectRatio="none">
          <polyline points={pts} fill="none" stroke={b.color} strokeWidth="1.4" strokeLinejoin="round" strokeLinecap="round"/>
        </svg>
      </div>
    </button>
  );
}

function PtTxRow({ t }) {
  const isIn = t.dir === "in";
  const isPending = t.state === "confirming";
  const fracDisplay = (() => {
    if (t.asset === "BTC") return t.amt.toFixed(4);
    if (t.asset === "XMR") return t.amt.toFixed(3);
    return t.amt.toFixed(2);
  })();
  return (
    <li className={`pt-vt-tx ${isIn ? "is-in" : "is-out"} ${isPending ? "is-pending" : ""}`}>
      <span className="pt-vt-tx-time mono">{t.at}</span>
      <span className={`pt-vt-tx-arrow pt-vt-tx-arrow-${isIn ? "in" : "out"}`}>
        {isIn ? "↓" : "↑"}
      </span>
      <div className="pt-vt-tx-mid">
        <div className="pt-vt-tx-row1">
          <span className="pt-vt-tx-cp">{t.counterparty}</span>
          {t.orderId && <span className="pt-vt-tx-order mono">#{t.orderId}</span>}
        </div>
        <div className="pt-vt-tx-row2">
          {t.txHash && <span className="pt-vt-tx-hash mono">{t.txHash}</span>}
          {t.note && <span className="pt-vt-tx-note">{t.note}</span>}
          {isPending && (
            <span className="pt-vt-tx-conf mono">
              <i/> {t.confirms}/{t.needs} confirmations
            </span>
          )}
        </div>
      </div>
      <div className="pt-vt-tx-amt">
        <div className={`pt-vt-tx-amt-num mono ${isIn ? "is-in" : "is-out"}`}>
          {isIn ? "+" : "−"}{fracDisplay} <span className="pt-vt-tx-amt-asset">{t.asset}</span>
        </div>
        {t.amtUsd && <div className="pt-vt-tx-amt-usd mono">≈ ${t.amtUsd.toLocaleString()}</div>}
      </div>
    </li>
  );
}

function PtAutomationsView() {
  const [selectedId, setSelectedId] = React.useState("a1");
  const selected = PT_AUTOMATIONS.find((a) => a.id === selectedId);
  const [autos, setAutos] = React.useState(PT_AUTOMATIONS);

  const toggleState = (id) => {
    setAutos((arr) =>
      arr.map((a) => a.id === id ? { ...a, state: a.state === "on" ? "off" : a.state === "off" ? "on" : "on" } : a)
    );
  };

  const sel = autos.find((a) => a.id === selectedId);
  const onCount = autos.filter((a) => a.state === "on").length;
  const totalRuns = autos.reduce((s, a) => s + a.runs24h, 0);

  return (
    <div className="pt-au" data-screen-label="Automations">
      <div className="pt-au-hd">
        <div>
          <h1>Automations</h1>
          <p>{onCount} active · {totalRuns} runs in last 24h · 1 paused, 1 off</p>
        </div>
        <div className="pt-au-hd-actions">
          <button className="pt-btn pt-btn-ghost"><window.I.search size={12}/> Browse templates</button>
          <button className="pt-btn pt-btn-primary"><window.I.plus size={12}/> New automation</button>
        </div>
      </div>

      <div className="pt-au-body">
        {/* List */}
        <section className="pt-card pt-au-list-card">
          <div className="pt-card-body pt-au-list-body">
            <ul className="pt-au-list">
              {autos.map((a) => (
                <li key={a.id}
                    className={`pt-au-row ${selectedId === a.id ? "is-active" : ""} pt-au-state-${a.state}`}
                    onClick={() => setSelectedId(a.id)}>
                  <span className={`pt-au-dot pt-au-dot-${a.state}`}/>
                  <div className="pt-au-row-mid">
                    <div className="pt-au-row-name">{a.name}</div>
                    <div className="pt-au-row-flow">
                      <span className="pt-au-trig">{a.triggerLabel}</span>
                      <span className="pt-au-arrow">→</span>
                      <span className="pt-au-act">{a.actionLabel}</span>
                    </div>
                  </div>
                  <div className="pt-au-row-meta">
                    <div className="pt-au-row-runs mono">{a.runs7d}<span> /7d</span></div>
                    <div className="pt-au-row-last">{a.lastRun}</div>
                  </div>
                  <button
                    className={`pt-au-toggle pt-au-toggle-${a.state}`}
                    onClick={(e) => { e.stopPropagation(); toggleState(a.id); }}
                    title={a.state === "on" ? "Pause" : a.state === "paused" ? "Resume" : "Enable"}>
                    <span/>
                  </button>
                </li>
              ))}
            </ul>
          </div>
        </section>

        {/* Detail */}
        <section className="pt-card pt-au-detail">
          <header className="pt-card-hd">
            <div>
              <h3>{sel.name}</h3>
              <p>{sel.description}</p>
            </div>
            <div className="pt-au-d-state">
              <span className={`pt-au-state-pill pt-au-state-pill-${sel.state}`}>
                <span className={`pt-au-dot pt-au-dot-${sel.state}`}/>
                {sel.state === "on" ? "Active" : sel.state === "paused" ? "Paused" : "Off"}
              </span>
            </div>
          </header>

          <div className="pt-card-body">
            {/* Flow diagram */}
            <div className="pt-au-flow">
              {/* Trigger */}
              <div className="pt-au-flow-step pt-au-flow-trigger">
                <div className="pt-au-flow-tag">When</div>
                <div className="pt-au-flow-label">{sel.flow.trigger.label}</div>
                <div className="pt-au-flow-detail">{sel.flow.trigger.detail}</div>
              </div>

              <div className="pt-au-flow-arrow">↓</div>

              {/* Conditions */}
              {sel.flow.conditions.length > 0 && (
                <>
                  <div className="pt-au-flow-step pt-au-flow-conds">
                    <div className="pt-au-flow-tag">If</div>
                    <ul className="pt-au-conds">
                      {sel.flow.conditions.map((c, i) => (
                        <li key={i} className={c.ok ? "is-ok" : "is-blocked"}>
                          {c.ok ? <window.I.check size={11}/> : <span className="pt-au-x">×</span>}
                          <span>{c.label}</span>
                          {c.note && <span className="pt-au-cond-note">— {c.note}</span>}
                        </li>
                      ))}
                    </ul>
                  </div>
                  <div className="pt-au-flow-arrow">↓</div>
                </>
              )}

              {/* Action */}
              <div className="pt-au-flow-step pt-au-flow-action">
                <div className="pt-au-flow-tag">Then</div>
                <div className="pt-au-flow-label">{sel.flow.action.label}</div>
                <div className="pt-au-flow-detail">{sel.flow.action.detail}</div>
              </div>
            </div>

            {/* Recent runs */}
            <div className="pt-au-runs">
              <div className="pt-au-runs-hd">
                <h4>Recent runs</h4>
                <span className="pt-au-runs-count">{sel.recent.length} {sel.recent.length === 1 ? "run" : "runs"}</span>
              </div>
              {sel.recent.length === 0 ? (
                <div className="pt-au-runs-empty">
                  Hasn't fired yet — turn it on to start collecting runs.
                </div>
              ) : (
                <ul className="pt-au-runs-list">
                  {sel.recent.map((r, i) => (
                    <li key={i} className={`pt-au-run pt-au-run-${r.state}`}>
                      <span className="pt-au-run-time mono">{r.at}</span>
                      <span className={`pt-au-run-bullet pt-au-run-bullet-${r.state}`}/>
                      <span className="pt-au-run-who">{r.who}</span>
                      <span className="pt-au-run-action">{r.action}</span>
                    </li>
                  ))}
                </ul>
              )}
            </div>

            {/* Footer */}
            <div className="pt-au-foot">
              <div className="pt-au-foot-stats">
                <div><span className="mono">{sel.runs7d}</span> runs · 7d</div>
                <div><span className="mono">{sel.runs24h}</span> runs · 24h</div>
                <div>last <span>{sel.lastRun}</span></div>
              </div>
              <div className="pt-au-foot-actions">
                <button className="pt-btn pt-btn-ghost">Edit flow</button>
                <button className="pt-btn pt-btn-ghost">View all runs</button>
              </div>
            </div>
          </div>
        </section>
      </div>
    </div>
  );
}

                    </div>
                  </div>
                )}

                )}
                {c.status === "deprecated" && (
                  <button className="pt-st-mini pt-st-mini-warn">Remove</button>
                )}
              </div>
            </li>
          ))}
        </ul>
      </PtStCard>

      <PtStCard title="Working hours" caption="Outside these hours, automations queue messages and send the next morning.">
        <PtStField label="Active window">
          <div style={{display:"flex", gap:8, alignItems:"center"}}>
            <input className="pt-st-input" type="time" defaultValue="07:00" style={{maxWidth:120}}/>

      </PtStCard>

      <div className="pt-st-foot">
        <span className="pt-st-foot-status"><i/> Saved automatically</span>
      </div>
    </div>
  );
}

    <div className={`pt-st-field ${compact ? "is-compact" : ""}`}>

        <label>{label}</label>
        {hint && <p>{hint}</p>}

      <div className="pt-st-field-r">{children}</div>
    </div>
  );
}

function PtStToggle({ defaultOn = false, on, onChange }) {
  const [state, setState] = React.useState(defaultOn);
  const isControlled = on !== undefined;
  const value = isControlled ? on : state;
  const flip = () => {
    const next = !value;
    if (!isControlled) setState(next);
    onChange && onChange(next);
  };
  return (
    <button className={`pt-au-toggle pt-au-toggle-${value ? "on" : "off"}`}
            onClick={flip}>
      <span/>
    </button>
  );
}

// app.jsx — main composition with dashboard + inbox routing

const TWEAK_DEFAULTS = /*EDITMODE-BEGIN*/{
  "theme": "light",
  "accent": "acid",
  "density": "regular",
  "rightRail": true
}/*EDITMODE-END*/;

function PtApp() {
  const [t, setTweak] = useTweaks(TWEAK_DEFAULTS);
  const [active, setActive] = React.useState("home");
  const [activeThread, setActiveThread] = React.useState("t01");
  const [activeCustomer, setActiveCustomer] = React.useState(null);
  const [confirmed, setConfirmed] = React.useState({});
  const [messages, setMessages] = React.useState(window.PT_MESSAGES);

  const onConfirm = (id) => setConfirmed((p) => ({ ...p, [id]: true }));
  const payments = window.PT_PAYMENTS.map((p) =>
    confirmed[p.id] ? { ...p, state: "confirmed" } : p);

  const onSend = (threadId, text) => {
    const newMsg = {
      id: "m" + Date.now(),
      from: "me",
      at: "Today · just now",
      text,
      optimistic: true,
    };
    setMessages((prev) => ({
      ...prev,
      [threadId]: [...(prev[threadId] || []), newMsg],
    }));
    setTimeout(() => {
      setMessages((prev) => ({
        ...prev,
        [threadId]: (prev[threadId] || []).map((m) =>
          m.id === newMsg.id ? { ...m, optimistic: false } : m),

    }, 600);

  const onSelectThread = (id) => {

        />

        {active === "home" && (
          <div className="pt-page">
            <div className="pt-page-hd">
              <div>
                <h1>Tuesday afternoon, dr_peptide.</h1>
                <p>23 active threads · 7 need a reply · 3 reorders due in &lt;48h</p>

                <button className="pt-btn pt-btn-ghost">Daily summary</button>

            <PtKpiRow />

            <div className="pt-grid">

              <PtPaymentsCard payments={payments} onConfirm={onConfirm} />

            <footer className="pt-foot">

              <span className="pt-foot-mid">For research use only · Not for human consumption.</span>
              <span className="mono">⌘K to search · ⌘N new msg</span>
            </footer>
          </div>
        )}

        {active === "inbox" && (
          <PtInboxView
            threads={window.PT_THREADS}
            activeId={activeThread}
            onSelect={setActiveThread}
            messagesById={messages}
            onSend={onSend}
            onBack={() => setActive("home")}
          />
        )}

        {active === "broadcasts" && (
          <PtBroadcastView onBack={() => setActive("home")} />
        )}

        {active === "catalog" && (
          <PtCatalogView />
        )}

        {active === "orders" && (
          <PtOrdersView />
        )}

        {active === "vault" && (
          <PtVaultView />
        )}

        {active === "automations" && (
          <PtAutomationsView />

        {active === "customers" && (

              <div><h1>Customers</h1><p>Click a name to open detail.</p></div>
            </div>
            <div className="pt-grid" style={{gridTemplateColumns:"1fr"}}>
              <section className="pt-card">
                <div className="pt-card-body">
                  <ul className="pt-thread-list">

            {value:"ember",label:"Ember"},
            {value:"violet",label:"Violet"},

          onChange={(v) => setTweak("accent", v)} />

        <TweakSection label="Layout" />
        <TweakRadio label="Density" value={t.density}

        <TweakToggle label="Right rail (dashboard)" value={t.rightRail}

    </div>
  );
}
