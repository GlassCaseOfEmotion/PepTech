<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Peptech — Dashboard</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet">
<style>

/* ===== peptech.css ===== */
/* peptech.css — Linear/Attio-flavored CRM, originally drawn for Peptech */

/* ─── Tokens ─────────────────────────────────────────────────────────────── */
:root {
  --pt-accent-h: 130;
  --pt-accent-c: 0.13;
  --pt-accent-l: 0.62;
  --pt-accent: oklch(var(--pt-accent-l) var(--pt-accent-c) var(--pt-accent-h));
  --pt-accent-soft: oklch(var(--pt-accent-l) var(--pt-accent-c) var(--pt-accent-h) / 0.14);
  --pt-accent-fg:  oklch(0.32 0.08 var(--pt-accent-h));

  /* light surfaces */
  --pt-bg:        oklch(0.985 0.002 100);
  --pt-bg-side:   oklch(0.972 0.003 100);
  --pt-surface:   oklch(1    0    0);
  --pt-surface-2: oklch(0.974 0.002 100);
  --pt-line:      oklch(0.91 0.004 100);
  --pt-line-soft: oklch(0.945 0.004 100);

  --pt-fg:        oklch(0.20 0.01 100);
  --pt-fg-2:      oklch(0.40 0.01 100);
  --pt-fg-3:      oklch(0.55 0.008 100);
  --pt-fg-4:      oklch(0.68 0.006 100);

  --pt-warn:      oklch(0.72 0.13 65);
  --pt-warn-soft: oklch(0.96 0.04 65);
  --pt-cool:      oklch(0.62 0.10 240);
  --pt-cool-soft: oklch(0.965 0.025 240);
  --pt-ok:        oklch(0.62 0.13 145);
  --pt-ok-soft:   oklch(0.965 0.04 145);
  --pt-danger:    oklch(0.60 0.18 25);

  /* channel colors */
  --pt-wa:  oklch(0.62 0.13 150);
  --pt-tg:  oklch(0.66 0.13 240);
  --pt-em:  oklch(0.55 0.02 280);

  --pt-radius: 8px;
  --pt-radius-sm: 6px;
  --pt-radius-lg: 12px;
  --pt-shadow: 0 1px 0 rgba(20,20,20,.04), 0 1px 2px rgba(20,20,20,.04);
  --pt-shadow-card: 0 0 0 0.5px oklch(0.9 0.005 100), 0 1px 0 oklch(0.96 0.004 100);

  --pt-font: "Inter", "IBM Plex Sans", ui-sans-serif, system-ui, -apple-system, sans-serif;
  --pt-mono: "JetBrains Mono", ui-monospace, "SFMono-Regular", Menlo, monospace;

  /* density */
  --pt-row-h: 44px;
  --pt-pad: 14px;
  --pt-gap: 12px;
}

.pt-d-compact { --pt-row-h: 36px; --pt-pad: 10px; --pt-gap: 8px; }
.pt-d-comfy   { --pt-row-h: 52px; --pt-pad: 18px; --pt-gap: 16px; }

.pt-th-dim {
  --pt-bg:        oklch(0.22 0.005 250);
  --pt-bg-side:   oklch(0.20 0.005 250);
  --pt-surface:   oklch(0.245 0.005 250);
  --pt-surface-2: oklch(0.225 0.005 250);
  --pt-line:      oklch(0.32 0.006 250);
  --pt-line-soft: oklch(0.27 0.006 250);
  --pt-fg:        oklch(0.95 0.005 250);
  --pt-fg-2:      oklch(0.78 0.005 250);
  --pt-fg-3:      oklch(0.62 0.005 250);
  --pt-fg-4:      oklch(0.50 0.005 250);
  --pt-warn-soft: oklch(0.32 0.04 65);
  --pt-cool-soft: oklch(0.30 0.04 240);
  --pt-ok-soft:   oklch(0.30 0.04 145);
  --pt-shadow-card: 0 0 0 0.5px oklch(0.32 0.006 250), 0 1px 0 oklch(0.27 0.006 250);
}
.pt-th-dark {
  --pt-bg:        oklch(0.13 0.004 260);
  --pt-bg-side:   oklch(0.115 0.004 260);
  --pt-surface:   oklch(0.155 0.004 260);
  --pt-surface-2: oklch(0.135 0.004 260);
  --pt-line:      oklch(0.24 0.005 260);
  --pt-line-soft: oklch(0.19 0.004 260);
  --pt-fg:        oklch(0.96 0.005 260);
  --pt-fg-2:      oklch(0.76 0.005 260);
  --pt-fg-3:      oklch(0.58 0.005 260);
  --pt-fg-4:      oklch(0.45 0.005 260);
  --pt-warn-soft: oklch(0.26 0.05 65);
  --pt-cool-soft: oklch(0.24 0.05 240);
  --pt-ok-soft:   oklch(0.24 0.05 145);
  --pt-shadow-card: 0 0 0 0.5px oklch(0.24 0.005 260), 0 1px 0 oklch(0.18 0.004 260);
}

/* ─── Base ───────────────────────────────────────────────────────────────── */
* { box-sizing: border-box; }
html, body, #root { height: 100%; margin: 0; }
body {
  font-family: var(--pt-font);
  font-size: 13px;
  line-height: 1.45;
  color: var(--pt-fg);
  background: var(--pt-bg);
  -webkit-font-smoothing: antialiased;
  font-feature-settings: "cv11","ss01","ss03";
}
button { font-family: inherit; }
.mono { font-family: var(--pt-mono); font-feature-settings: "tnum"; letter-spacing: -0.01em; }
kbd {
  font-family: var(--pt-mono); font-size: 10px;
  padding: 1px 5px; border-radius: 4px;
  background: oklch(from var(--pt-fg) l c h / 0.06);
  color: var(--pt-fg-3);
}

/* ─── Layout shell ───────────────────────────────────────────────────────── */
.pt-root {
  display: grid;
  grid-template-columns: 232px 1fr 320px;
  height: 100%;
  background: var(--pt-bg);
  color: var(--pt-fg);
}
.pt-root.no-right { grid-template-columns: 232px 1fr; }
.pt-d-compact .pt-root { grid-template-columns: 220px 1fr 296px; }

/* ─── Sidebar ────────────────────────────────────────────────────────────── */
.pt-sidebar {
  background: var(--pt-bg-side);
  border-right: 0.5px solid var(--pt-line);
  display: flex; flex-direction: column;
  padding: 10px 8px;
  min-height: 0;
}
.pt-brand {
  display: flex; align-items: center; gap: 8px;
  padding: 6px 6px 10px;
}
.pt-brand-mark {
  width: 22px; height: 22px;
  border-radius: 6px;
  background: var(--pt-fg);
  color: var(--pt-bg);
  display: grid; place-items: center;
}
.pt-brand-name {
  font-weight: 600; font-size: 13.5px; letter-spacing: -0.01em;
  flex: 1;
}
.pt-brand-name span { color: var(--pt-accent); }
.pt-brand-menu {
  appearance: none; border: 0; background: transparent; color: var(--pt-fg-3);
  width: 22px; height: 22px; border-radius: 5px; display: grid; place-items: center;
  cursor: pointer;
}
.pt-brand-menu:hover { background: oklch(from var(--pt-fg) l c h / 0.06); color: var(--pt-fg); }

.pt-compose, .pt-search {
  display: flex; align-items: center; gap: 8px;
  margin: 2px 4px 6px;
  padding: 0 9px; height: 30px;
  border: 0.5px solid var(--pt-line);
  border-radius: var(--pt-radius);
  background: var(--pt-surface);
  color: var(--pt-fg-2);
  font-size: 12.5px;
  cursor: pointer;
}
.pt-compose { color: var(--pt-fg); font-weight: 500; }
.pt-compose svg { color: var(--pt-accent-fg); }
.pt-compose span { flex: 1; text-align: left; }
.pt-compose:hover { background: var(--pt-surface-2); }
.pt-search:hover { background: var(--pt-surface-2); }
.pt-search span { flex: 1; text-align: left; color: var(--pt-fg-3); }

.pt-nav {
  display: flex; flex-direction: column; gap: 1px;
  padding: 6px 0;
  flex: 1;
  overflow-y: auto;
  min-height: 0;
}
.pt-nav-item {
  display: flex; align-items: center; gap: 9px;
  padding: 0 9px; height: 28px;
  border-radius: 6px;
  background: transparent; border: 0; color: var(--pt-fg-2);
  font-size: 12.5px;
  cursor: pointer;
  text-align: left;
}
.pt-nav-item:hover { background: oklch(from var(--pt-fg) l c h / 0.05); color: var(--pt-fg); }
.pt-nav-item.is-on {
  background: oklch(from var(--pt-fg) l c h / 0.07);
  color: var(--pt-fg);
  font-weight: 500;
}
.pt-nav-item.is-on svg { color: var(--pt-accent-fg); }
.pt-nav-label { flex: 1; }
.pt-nav-badge {
  font-family: var(--pt-mono); font-size: 10px;
  padding: 1px 5px; border-radius: 4px;
  background: var(--pt-accent-soft);
  color: var(--pt-accent-fg);
  font-weight: 500;
}
.pt-nav-sep {
  height: 1px; background: var(--pt-line-soft);
  margin: 8px 8px;
}
.pt-nav-section {
  font-size: 10.5px; text-transform: uppercase; letter-spacing: 0.06em;
  color: var(--pt-fg-4);
  padding: 2px 9px 4px;
  display: flex; justify-content: space-between;
}
.pt-pin {
  display: flex; align-items: center; gap: 8px;
  padding: 0 9px; height: 36px;
  background: transparent; border: 0; cursor: pointer;
  border-radius: 6px;
  text-align: left;
  color: var(--pt-fg-2);
}
.pt-pin:hover { background: oklch(from var(--pt-fg) l c h / 0.05); }
.pt-pin svg { color: var(--pt-fg-3); }
.pt-pin-body { flex: 1; min-width: 0; }
.pt-pin-name { font-size: 12px; color: var(--pt-fg); font-weight: 500; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
.pt-pin-snip { font-size: 11px; color: var(--pt-fg-3); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
.pt-pin-unread {
  font-family: var(--pt-mono); font-size: 10px;
  background: var(--pt-accent); color: oklch(0.18 0.02 var(--pt-accent-h));
  border-radius: 999px; padding: 1px 5px; font-weight: 600;
}

.pt-side-foot {
  border-top: 0.5px solid var(--pt-line-soft);
  margin: 6px -8px -10px;
  padding: 8px 10px;
}
.pt-me { display: flex; align-items: center; gap: 8px; padding: 4px; border-radius: 6px; }
.pt-me:hover { background: oklch(from var(--pt-fg) l c h / 0.05); }
.pt-me-av {
  width: 26px; height: 26px; border-radius: 6px;
  background: var(--pt-accent-soft);
  color: var(--pt-accent-fg);
  display: grid; place-items: center;
  font-size: 11px; font-weight: 600;
}
.pt-me-info { flex: 1; min-width: 0; }
.pt-me-name { font-size: 12px; font-weight: 500; }
.pt-me-status { font-size: 10.5px; color: var(--pt-fg-3); display: flex; align-items: center; gap: 5px; }
.pt-dot { width: 6px; height: 6px; border-radius: 50%; background: var(--pt-ok); display: inline-block; }
.pt-dot-ok { background: var(--pt-ok); }
.pt-dot-warn { background: var(--pt-warn); }
.pt-dot-cool { background: var(--pt-cool); }
.pt-me-more {
  background: transparent; border: 0; color: var(--pt-fg-3);
  width: 22px; height: 22px; border-radius: 5px; cursor: pointer;
}
.pt-me-more:hover { background: oklch(from var(--pt-fg) l c h / 0.06); color: var(--pt-fg); }

/* ─── Main column ────────────────────────────────────────────────────────── */
.pt-main { min-width: 0; display: flex; flex-direction: column; min-height: 0; }
.pt-top {
  display: flex; align-items: center; gap: 16px;
  height: 48px; padding: 0 18px;
  border-bottom: 0.5px solid var(--pt-line);
  background: var(--pt-bg);
  flex-shrink: 0;
}
.pt-top-crumbs {
  display: flex; align-items: center; gap: 6px;
  font-size: 12px;
}
.pt-crumb-home { color: var(--pt-fg-3); }
.pt-crumb-sep { color: var(--pt-fg-4); }
.pt-crumb-now { color: var(--pt-fg); font-weight: 500; }
.pt-top-mid {
  flex: 1;
  display: flex; gap: 6px;
  justify-content: center;
}
.pt-chip {
  display: inline-flex; align-items: center; gap: 6px;
  padding: 3px 9px 3px 8px;
  border-radius: 999px;
  border: 0.5px solid var(--pt-line);
  background: var(--pt-surface);
  font-size: 11px;
  color: var(--pt-fg-2);
}
.pt-chip-wa svg { color: var(--pt-wa); }
.pt-chip-tg svg { color: var(--pt-tg); }
.pt-chip-em svg { color: var(--pt-em); }
.pt-chip-dot { width: 6px; height: 6px; border-radius: 50%; background: var(--pt-ok); margin-left: 2px; }
.pt-top-actions { display: flex; align-items: center; gap: 4px; }
.pt-iconbtn {
  position: relative;
  width: 28px; height: 28px;
  display: grid; place-items: center;
  background: transparent; border: 0;
  color: var(--pt-fg-2); border-radius: 6px; cursor: pointer;
}
.pt-iconbtn:hover { background: oklch(from var(--pt-fg) l c h / 0.06); color: var(--pt-fg); }
.pt-iconbtn.is-on { background: var(--pt-accent-soft); color: var(--pt-accent-fg); }
.pt-iconbtn-dot {
  position: absolute; top: 6px; right: 6px;
  width: 6px; height: 6px; border-radius: 50%;
  background: var(--pt-warn);
  box-shadow: 0 0 0 1.5px var(--pt-bg);
}
.pt-top-divider { width: 1px; height: 16px; background: var(--pt-line); margin: 0 4px; }
.pt-cta {
  height: 28px; padding: 0 12px;
  background: var(--pt-fg); color: var(--pt-bg);
  border: 0; border-radius: 6px; cursor: pointer;
  font-size: 12px; font-weight: 500;
}
.pt-cta:hover { background: oklch(from var(--pt-fg) calc(l - 0.05) c h); }

/* ─── Page ───────────────────────────────────────────────────────────────── */
.pt-page {
  flex: 1; min-height: 0;
  overflow-y: auto;
  padding: 22px 22px 32px;
}
.pt-page-hd {
  display: flex; justify-content: space-between; align-items: flex-end;
  margin-bottom: 18px;
}
.pt-page-hd h1 {
  margin: 0; font-size: 22px; font-weight: 600; letter-spacing: -0.018em;
}
.pt-page-hd p {
  margin: 3px 0 0; color: var(--pt-fg-3); font-size: 13px;
}
.pt-page-actions { display: flex; gap: 8px; }
.pt-btn {
  display: inline-flex; align-items: center; gap: 6px;
  height: 30px; padding: 0 12px;
  border-radius: 7px;
  font-size: 12.5px; font-weight: 500;
  cursor: pointer;
  border: 0.5px solid var(--pt-line);
  background: var(--pt-surface);
  color: var(--pt-fg);
  white-space: nowrap;
}
.pt-btn-ghost { background: transparent; }
.pt-btn-primary {
  background: var(--pt-fg); color: var(--pt-bg); border-color: transparent;
}

/* ─── KPIs ───────────────────────────────────────────────────────────────── */
.pt-kpis {
  display: grid; grid-template-columns: repeat(4, 1fr);
  gap: var(--pt-gap);
  margin-bottom: var(--pt-gap);
}
.pt-kpi {
  background: var(--pt-surface);
  border-radius: var(--pt-radius);
  padding: 12px 14px 13px;
  box-shadow: var(--pt-shadow-card);
}
.pt-kpi-lbl { font-size: 11px; color: var(--pt-fg-3); text-transform: uppercase; letter-spacing: 0.05em; font-weight: 500; }
.pt-kpi-val-row { display: flex; align-items: baseline; gap: 10px; margin-top: 4px; }
.pt-kpi-val { font-size: 22px; font-weight: 600; letter-spacing: -0.02em; font-variant-numeric: tabular-nums; }
.pt-kpi-delta { font-size: 11px; font-family: var(--pt-mono); }
.pt-kpi-delta.up { color: var(--pt-ok); }
.pt-kpi-delta.dn { color: var(--pt-danger); }
.pt-spark { margin-left: auto; }
.pt-kpi-sub { font-size: 11.5px; color: var(--pt-fg-3); margin-top: 3px; }

/* ─── Card grid ──────────────────────────────────────────────────────────── */
.pt-grid {
  display: grid;
  grid-template-columns: repeat(3, 1fr);
  grid-auto-rows: minmax(280px, auto);
  gap: var(--pt-gap);
}
.pt-span-2 { grid-column: span 2; grid-row: span 2; }
.pt-card {
  background: var(--pt-surface);
  border-radius: var(--pt-radius);
  box-shadow: var(--pt-shadow-card);
  display: flex; flex-direction: column;
  min-height: 0;
  overflow: hidden;
}
.pt-card-hd {
  display: flex; justify-content: space-between; align-items: flex-start;
  padding: 12px 14px 10px;
  gap: 10px;
}
.pt-card-hd h3 { margin: 0; font-size: 13px; font-weight: 600; letter-spacing: -0.01em; }
.pt-card-hd p  { margin: 1px 0 0; font-size: 11.5px; color: var(--pt-fg-3); }
.pt-card-body { padding: 0 4px 10px; flex: 1; min-height: 0; }
.pt-card-body.is-scroll { overflow-y: auto; }
.pt-card-ft {
  border-top: 0.5px solid var(--pt-line-soft);
  padding: 8px 14px; font-size: 11.5px; color: var(--pt-fg-3);
}
.pt-link {
  background: transparent; border: 0;
  font-size: 11.5px; color: var(--pt-fg-2); cursor: pointer;
  font-weight: 500;
}
.pt-link:hover { color: var(--pt-fg); }

.pt-pillbar { display: flex; gap: 2px; background: oklch(from var(--pt-fg) l c h / 0.05); border-radius: 7px; padding: 2px; }
.pt-pill {
  display: inline-flex; align-items: center; gap: 5px;
  padding: 3px 8px;
  background: transparent; border: 0; border-radius: 5px;
  font-size: 11px; color: var(--pt-fg-2); cursor: pointer;
}
.pt-pill.is-on { background: var(--pt-surface); color: var(--pt-fg); box-shadow: 0 0 0 0.5px var(--pt-line); }
.pt-pill-num { font-family: var(--pt-mono); font-size: 10px; color: var(--pt-fg-3); }
.pt-pill.is-on .pt-pill-num { color: var(--pt-accent-fg); }

.pt-segctl { display: flex; gap: 0; background: oklch(from var(--pt-fg) l c h / 0.05); border-radius: 6px; padding: 2px; }
.pt-segctl button {
  appearance: none; border: 0; background: transparent;
  font-size: 11px; padding: 2px 9px; border-radius: 4px;
  color: var(--pt-fg-2); cursor: pointer; font-family: var(--pt-mono);
}
.pt-segctl button.is-on { background: var(--pt-surface); color: var(--pt-fg); box-shadow: 0 0 0 0.5px var(--pt-line); }

/* ─── Inbox / threads ────────────────────────────────────────────────────── */
.pt-thread-list { list-style: none; margin: 0; padding: 0; }
.pt-thread {
  display: grid; grid-template-columns: 32px 1fr auto;
  align-items: center; gap: 10px;
  padding: 9px 12px;
  cursor: pointer;
  border-top: 0.5px solid var(--pt-line-soft);
  position: relative;
}
.pt-thread:first-child { border-top: 0; }
.pt-thread:hover { background: oklch(from var(--pt-fg) l c h / 0.025); }
.pt-thread.is-active {
  background: var(--pt-accent-soft);
}
.pt-thread.is-active::before {
  content: ""; position: absolute; left: 0; top: 6px; bottom: 6px; width: 2px;
  background: var(--pt-accent); border-radius: 2px;
}
.pt-thread-av {
  position: relative;
  width: 32px; height: 32px; border-radius: 7px;
  background: var(--pt-surface-2);
  display: grid; place-items: center;
  font-size: 11px; font-weight: 600; color: var(--pt-fg-2);
  border: 0.5px solid var(--pt-line);
}
.pt-thread-av[data-channel="wa"] { color: var(--pt-wa); }
.pt-thread-av[data-channel="tg"] { color: var(--pt-tg); }
.pt-thread-av[data-channel="em"] { color: var(--pt-em); }
.pt-thread-ch {
  position: absolute; right: -3px; bottom: -3px;
  width: 14px; height: 14px;
  background: var(--pt-bg); border-radius: 50%;
  display: grid; place-items: center;
}
.pt-ch-wa { color: var(--pt-wa); }
.pt-ch-tg { color: var(--pt-tg); }
.pt-ch-em { color: var(--pt-em); }
.pt-thread-mid { min-width: 0; overflow: hidden; }
.pt-thread-row1 { display: flex; align-items: center; gap: 6px; min-width: 0; }
.pt-thread-name { font-size: 12.5px; font-weight: 500; color: var(--pt-fg); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; flex-shrink: 1; min-width: 0; }
.pt-thread.is-unread .pt-thread-name { font-weight: 600; }
.pt-thread-snip {
  font-size: 12px; color: var(--pt-fg-3);
  white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
  margin-top: 1px;
}
.pt-thread.is-unread .pt-thread-snip { color: var(--pt-fg-2); }
.pt-thread-meta { display: flex; flex-direction: column; align-items: flex-end; gap: 4px; }
.pt-thread-time { font-size: 10.5px; color: var(--pt-fg-4); font-family: var(--pt-mono); }
.pt-thread-unread {
  background: var(--pt-accent); color: oklch(0.18 0.02 var(--pt-accent-h));
  font-family: var(--pt-mono); font-size: 10px; font-weight: 600;
  border-radius: 999px; padding: 1px 6px; min-width: 18px; text-align: center;
}

/* tags */
.pt-tag {
  font-size: 10px;
  padding: 1px 6px; border-radius: 4px;
  background: oklch(from var(--pt-fg) l c h / 0.07);
  color: var(--pt-fg-2);
  font-weight: 500;
  letter-spacing: 0.01em;
}
.pt-tag-soft { background: oklch(from var(--pt-fg) l c h / 0.04); color: var(--pt-fg-3); }
.pt-tag-vip { background: var(--pt-accent-soft); color: var(--pt-accent-fg); }
.pt-tag-new { background: var(--pt-cool-soft); color: var(--pt-cool); }
.pt-tag-warn { background: var(--pt-warn-soft); color: var(--pt-warn); }

/* trust */
.pt-trust-pill {
  font-family: var(--pt-mono); font-size: 10.5px; font-weight: 600;
  padding: 1px 5px; border-radius: 4px;
  background: oklch(from var(--pt-fg) l c h / 0.05);
  color: var(--pt-fg-3);
}
.pt-trust-hi { background: var(--pt-ok-soft); color: var(--pt-ok); }
.pt-trust-md { background: var(--pt-warn-soft); color: var(--pt-warn); }
.pt-trust-lo { background: oklch(0.96 0.04 25); color: var(--pt-danger); }
.pt-trust { display: flex; flex-direction: column; align-items: flex-end; }
.pt-trust .pt-trust-num { font-family: var(--pt-mono); font-size: 16px; font-weight: 600; line-height: 1; }
.pt-trust .pt-trust-lbl { font-size: 9px; color: var(--pt-fg-4); text-transform: uppercase; letter-spacing: 0.06em; }
.pt-trust-hi .pt-trust-num { color: var(--pt-ok); }
.pt-trust-md .pt-trust-num { color: var(--pt-warn); }
.pt-trust-lo .pt-trust-num { color: var(--pt-danger); }

/* ─── Payments ───────────────────────────────────────────────────────────── */
.pt-pay-list { list-style: none; margin: 0; padding: 0; }
.pt-pay {
  display: grid; grid-template-columns: 46px 1fr auto;
  gap: 10px; align-items: center;
  padding: 9px 12px;
  border-top: 0.5px solid var(--pt-line-soft);
}
.pt-pay:first-child { border-top: 0; }
.pt-pay-asset {
  font-family: var(--pt-mono); font-size: 10.5px; font-weight: 600;
  text-align: center;
  padding: 4px 6px; border-radius: 5px;
  background: oklch(from var(--pt-fg) l c h / 0.05);
  color: var(--pt-fg-2);
}
.pt-pay-asset[data-asset="USDT"] { background: oklch(0.95 0.06 165); color: oklch(0.40 0.10 165); }
.pt-pay-asset[data-asset="BTC"]  { background: oklch(0.96 0.06 60);  color: oklch(0.50 0.14 60);  }
.pt-pay-asset[data-asset="XMR"]  { background: oklch(0.96 0.04 30);  color: oklch(0.45 0.12 30);  }
.pt-th-dim .pt-pay-asset[data-asset="USDT"], .pt-th-dark .pt-pay-asset[data-asset="USDT"] { background: oklch(0.30 0.06 165); color: oklch(0.85 0.10 165); }
.pt-th-dim .pt-pay-asset[data-asset="BTC"],  .pt-th-dark .pt-pay-asset[data-asset="BTC"]  { background: oklch(0.30 0.06 60);  color: oklch(0.85 0.12 60);  }
.pt-th-dim .pt-pay-asset[data-asset="XMR"],  .pt-th-dark .pt-pay-asset[data-asset="XMR"]  { background: oklch(0.30 0.06 30);  color: oklch(0.85 0.10 30);  }

.pt-pay-who { font-size: 12.5px; font-weight: 500; }
.pt-pay-state { font-size: 11px; color: var(--pt-fg-3); display: flex; align-items: center; gap: 5px; margin-top: 1px; }
.pt-pay-amt-col { text-align: right; }
.pt-pay-amt { font-family: var(--pt-mono); font-size: 13px; font-weight: 600; font-variant-numeric: tabular-nums; }
.pt-pay-act {
  margin-top: 2px;
  font-size: 10.5px;
  background: transparent; border: 0;
  color: var(--pt-accent-fg); font-weight: 500; cursor: pointer;
}
.pt-pay-act:hover { text-decoration: underline; }
.pt-pay-confirmed .pt-pay-amt { color: var(--pt-ok); }

/* ─── Reorders ───────────────────────────────────────────────────────────── */
.pt-reorder-list { list-style: none; margin: 0; padding: 0; }
.pt-reorder {
  display: grid; grid-template-columns: 70px 1fr 76px 26px;
  gap: 10px; align-items: center;
  padding: 8px 12px;
  border-top: 0.5px solid var(--pt-line-soft);
}
.pt-reorder:first-child { border-top: 0; }
.pt-reorder-due { text-align: left; }
.pt-reorder-when { font-size: 11.5px; font-weight: 600; color: var(--pt-fg); }
.pt-reorder-when.is-now { color: var(--pt-warn); }
.pt-reorder-cycle { font-size: 10px; color: var(--pt-fg-4); font-family: var(--pt-mono); margin-top: 1px; }
.pt-reorder-who { font-size: 12px; font-weight: 500; }
.pt-reorder-prod { font-size: 11px; color: var(--pt-fg-3); margin-top: 1px; }
.pt-reorder-conf { display: flex; align-items: center; gap: 6px; }
.pt-confbar { flex: 1; height: 4px; background: oklch(from var(--pt-fg) l c h / 0.07); border-radius: 999px; overflow: hidden; }
.pt-confbar-fill { height: 100%; background: var(--pt-accent); border-radius: 999px; }
.pt-reorder-pct { font-family: var(--pt-mono); font-size: 10.5px; color: var(--pt-fg-3); }
.pt-reorder-act {
  width: 26px; height: 26px;
  border: 0.5px solid var(--pt-line);
  background: var(--pt-surface);
  border-radius: 6px; cursor: pointer;
  display: grid; place-items: center;
  color: var(--pt-fg-2);
}
.pt-reorder-act:hover { color: var(--pt-accent-fg); border-color: var(--pt-accent); }

/* ─── Stock table ────────────────────────────────────────────────────────── */
.pt-stock { width: 100%; border-collapse: collapse; }
.pt-stock th, .pt-stock td {
  padding: 7px 12px; text-align: left;
  border-top: 0.5px solid var(--pt-line-soft);
  font-size: 12px;
}
.pt-stock th {
  border-top: 0; border-bottom: 0.5px solid var(--pt-line);
  font-size: 10.5px; font-weight: 500; color: var(--pt-fg-4);
  text-transform: uppercase; letter-spacing: 0.04em;
}
.pt-stock .r { text-align: right; }
.pt-sku { font-family: var(--pt-mono); font-size: 11px; font-weight: 600; }
.pt-sku-name { font-size: 11px; color: var(--pt-fg-3); margin-top: 1px; }
.pt-stock-unit { color: var(--pt-fg-4); margin-left: 2px; font-size: 10px; }
.pt-stock tr.is-low td { background: oklch(from var(--pt-warn) 0.97 0.03 h); }
.pt-th-dim .pt-stock tr.is-low td, .pt-th-dark .pt-stock tr.is-low td { background: oklch(from var(--pt-warn) 0.25 0.04 h); }
.pt-stock tr.is-out td { color: var(--pt-fg-4); }
.pt-out { color: var(--pt-danger); font-family: var(--pt-mono); font-weight: 600; font-size: 10.5px; }
.pt-stock td.up { color: var(--pt-ok); }
.pt-stock td.dn { color: var(--pt-danger); }

/* ─── Revenue bars ───────────────────────────────────────────────────────── */
.pt-bars {
  display: grid; grid-template-columns: repeat(7, 1fr);
  align-items: end; gap: 8px;
  padding: 12px 14px 4px;
  height: 100%;
}
.pt-bar-col { display: flex; flex-direction: column; align-items: center; gap: 6px; height: 100%; }
.pt-bar-track {
  width: 100%; flex: 1;
  background: oklch(from var(--pt-fg) l c h / 0.04);
  border-radius: 4px;
  position: relative;
  display: flex; align-items: flex-end;
}
.pt-bar-fill {
  width: 100%;
  background: var(--pt-accent);
  border-radius: 4px;
  position: relative;
  transition: height .3s;
}
.pt-bar-tip {
  position: absolute; top: -18px; left: 50%; transform: translateX(-50%);
  font-family: var(--pt-mono); font-size: 10px; color: var(--pt-fg-3);
  white-space: nowrap; opacity: 0; transition: opacity .15s;
}
.pt-bar-col:hover .pt-bar-tip { opacity: 1; }
.pt-bar-lbl { font-size: 10.5px; color: var(--pt-fg-4); font-family: var(--pt-mono); }

/* ─── Shipments ──────────────────────────────────────────────────────────── */
.pt-ship-list { list-style: none; margin: 0; padding: 0; }
.pt-ship {
  display: grid; grid-template-columns: 28px 1fr;
  gap: 10px; align-items: flex-start;
  padding: 9px 12px;
  border-top: 0.5px solid var(--pt-line-soft);
}
.pt-ship:first-child { border-top: 0; }
.pt-ship-icon {
  width: 26px; height: 26px; border-radius: 6px;
  background: var(--pt-surface-2);
  display: grid; place-items: center;
  color: var(--pt-fg-3);
  border: 0.5px solid var(--pt-line);
}
.pt-ship-delivered .pt-ship-icon { background: var(--pt-ok-soft); color: var(--pt-ok); border-color: transparent; }
.pt-ship-in_transit .pt-ship-icon { background: var(--pt-cool-soft); color: var(--pt-cool); border-color: transparent; }
.pt-ship-customs .pt-ship-icon { background: var(--pt-warn-soft); color: var(--pt-warn); border-color: transparent; }
.pt-ship-row1 { display: flex; align-items: center; gap: 8px; font-size: 12px; }
.pt-ship-to { font-weight: 500; }
.pt-ship-carrier { font-size: 10px; padding: 1px 5px; background: oklch(from var(--pt-fg) l c h / 0.06); border-radius: 3px; color: var(--pt-fg-2); font-weight: 500; }
.pt-ship-id { font-size: 10.5px; color: var(--pt-fg-4); }
.pt-ship-track { display: flex; align-items: center; gap: 4px; margin-top: 5px; }
.pt-ship-step { width: 22px; height: 3px; border-radius: 999px; background: oklch(from var(--pt-fg) l c h / 0.08); }
.pt-ship-step.on { background: var(--pt-accent); }
.pt-ship-status { font-size: 10.5px; color: var(--pt-fg-3); margin-left: 6px; }

/* ─── Right rail ─────────────────────────────────────────────────────────── */
.pt-right {
  border-left: 0.5px solid var(--pt-line);
  background: var(--pt-bg-side);
  overflow-y: auto;
  padding: 14px 14px 24px;
  display: flex; flex-direction: column; gap: 16px;
  min-height: 0;
}
.pt-right-section { display: flex; flex-direction: column; gap: 8px; }
.pt-right-hd {
  display: flex; justify-content: space-between; align-items: center;
  font-size: 11px; text-transform: uppercase; letter-spacing: 0.06em;
  color: var(--pt-fg-3); font-weight: 500;
}
.pt-right-add {
  width: 18px; height: 18px; border-radius: 4px;
  border: 0; background: transparent; color: var(--pt-fg-3); cursor: pointer;
  display: grid; place-items: center;
}
.pt-right-add:hover { background: oklch(from var(--pt-fg) l c h / 0.06); color: var(--pt-fg); }
.pt-agenda { list-style: none; margin: 0; padding: 0; display: flex; flex-direction: column; gap: 2px; }
.pt-agenda-i {
  display: grid; grid-template-columns: 14px 1fr auto;
  gap: 9px; align-items: flex-start;
  padding: 7px 8px;
  border-radius: 6px;
}
.pt-agenda-i:hover { background: oklch(from var(--pt-fg) l c h / 0.04); }
.pt-agenda-bullet {
  width: 7px; height: 7px; border-radius: 50%;
  background: var(--pt-fg-4); margin-top: 6px;
  display: block;
}
.pt-bul-warn { background: var(--pt-warn); }
.pt-bul-cool { background: var(--pt-cool); }
.pt-agenda-t { font-size: 12px; font-weight: 500; }
.pt-agenda-s { font-size: 11px; color: var(--pt-fg-3); margin-top: 1px; }
.pt-agenda-time { font-family: var(--pt-mono); font-size: 10.5px; color: var(--pt-fg-4); }

.pt-cust { background: var(--pt-surface); border-radius: var(--pt-radius); padding: 12px; box-shadow: var(--pt-shadow-card); }
.pt-cust-hd { display: flex; align-items: center; gap: 10px; }
.pt-cust-av {
  width: 36px; height: 36px; border-radius: 8px;
  background: var(--pt-surface-2); border: 0.5px solid var(--pt-line);
  display: grid; place-items: center; font-weight: 600; font-size: 12px;
  color: var(--pt-fg-2);
}
.pt-cust-av[data-channel="wa"] { color: var(--pt-wa); }
.pt-cust-av[data-channel="tg"] { color: var(--pt-tg); }
.pt-cust-id { flex: 1; min-width: 0; }
.pt-cust-name { font-size: 13px; font-weight: 600; }
.pt-cust-handle { font-size: 11px; color: var(--pt-fg-3); margin-top: 1px; }
.pt-cust-stats {
  display: grid; grid-template-columns: repeat(3, 1fr);
  gap: 6px; margin-top: 12px;
  padding-top: 10px; border-top: 0.5px solid var(--pt-line-soft);
}
.pt-cust-stats .lbl { font-size: 10px; color: var(--pt-fg-4); text-transform: uppercase; letter-spacing: 0.05em; }
.pt-cust-stats .val { font-size: 12px; font-weight: 600; margin-top: 1px; }
.pt-cust-tags { display: flex; flex-wrap: wrap; gap: 4px; margin-top: 10px; }
.pt-cust-history { margin-top: 10px; padding-top: 10px; border-top: 0.5px solid var(--pt-line-soft); }
.pt-cust-hist-hd { font-size: 10.5px; color: var(--pt-fg-4); text-transform: uppercase; letter-spacing: 0.05em; margin-bottom: 6px; }
.pt-cust-history ul { list-style: none; margin: 0; padding: 0; display: flex; flex-direction: column; gap: 4px; }
.pt-cust-history li {
  display: grid; grid-template-columns: 60px 1fr auto;
  font-size: 11.5px; gap: 8px;
}
.pt-cust-history li > span:first-child { color: var(--pt-fg-4); }

.pt-quicks { display: flex; flex-wrap: wrap; gap: 4px; }
.pt-quick {
  font-size: 11px;
  padding: 4px 9px;
  background: var(--pt-surface);
  border: 0.5px solid var(--pt-line);
  border-radius: 999px;
  color: var(--pt-fg-2);
  cursor: pointer;
  white-space: nowrap;
}
.pt-quick:hover { background: var(--pt-accent-soft); color: var(--pt-accent-fg); border-color: transparent; }

/* ─── Footer ─────────────────────────────────────────────────────────────── */
.pt-foot {
  margin-top: 22px; padding-top: 14px;
  border-top: 0.5px solid var(--pt-line-soft);
  display: flex; justify-content: space-between; align-items: center;
  font-size: 11px; color: var(--pt-fg-4);
}
.pt-foot-mid { font-style: italic; }


/* ===== inbox.css ===== */
/* inbox.css — Inbox view styles */

.pt-root.is-inbox { grid-template-columns: 232px 1fr; }
.pt-root.is-inbox .pt-page { padding: 0; }

.pt-inbox {
  display: grid;
  grid-template-columns: 320px 1fr 320px;
  height: calc(100vh - 48px);
  overflow: hidden;
}
.pt-d-compact .pt-inbox { grid-template-columns: 296px 1fr 296px; }

/* ── Thread list column ─────────────────────────────────────────────── */
.pt-ix-list {
  display: flex; flex-direction: column;
  border-right: 0.5px solid var(--pt-line);
  background: var(--pt-bg-side);
  min-height: 0;
}
.pt-ix-list-hd {
  display: flex; align-items: center; gap: 6px;
  padding: 10px 12px; height: 44px;
  border-bottom: 0.5px solid var(--pt-line-soft);
}
.pt-ix-back {
  width: 24px; height: 24px; border-radius: 5px;
  display: grid; place-items: center;
  border: 0; background: transparent; color: var(--pt-fg-2); cursor: pointer;
}
.pt-ix-back:hover { background: oklch(from var(--pt-fg) l c h / 0.06); color: var(--pt-fg); }
.pt-ix-list-title { flex: 1; font-size: 13px; font-weight: 600; }

.pt-ix-search {
  display: flex; align-items: center; gap: 7px;
  margin: 8px 12px;
  height: 30px; padding: 0 10px;
  border: 0.5px solid var(--pt-line);
  border-radius: 7px;
  background: var(--pt-surface);
  color: var(--pt-fg-3);
}
.pt-ix-search input {
  flex: 1; border: 0; background: transparent; outline: none;
  font: inherit; color: var(--pt-fg);
  font-size: 12px;
}
.pt-ix-search input::placeholder { color: var(--pt-fg-4); }

.pt-ix-filters {
  padding: 0 12px 8px;
  display: flex; gap: 3px;
  flex-wrap: wrap;
}
.pt-ix-filters .pt-pill { padding: 3px 7px; font-size: 10.5px; }

.pt-ix-threads {
  list-style: none; margin: 0; padding: 0;
  flex: 1; overflow-y: auto; min-height: 0;
}
.pt-ixt {
  display: grid; grid-template-columns: 36px 1fr;
  gap: 10px; align-items: flex-start;
  padding: 10px 12px;
  cursor: pointer;
  border-bottom: 0.5px solid var(--pt-line-soft);
  position: relative;
}
.pt-ixt:hover { background: oklch(from var(--pt-fg) l c h / 0.025); }
.pt-ixt.is-active {
  background: var(--pt-accent-soft);
}
.pt-ixt.is-active::before {
  content: ""; position: absolute; left: 0; top: 8px; bottom: 8px; width: 2px;
  background: var(--pt-accent); border-radius: 2px;
}
.pt-ixt-av {
  position: relative;
  width: 36px; height: 36px; border-radius: 8px;
  background: var(--pt-surface-2);
  display: grid; place-items: center;
  font-size: 12px; font-weight: 600; color: var(--pt-fg-2);
  border: 0.5px solid var(--pt-line);
}
.pt-ixt-av[data-channel="wa"] { color: var(--pt-wa); }
.pt-ixt-av[data-channel="tg"] { color: var(--pt-tg); }
.pt-ixt-av[data-channel="em"] { color: var(--pt-em); }
.pt-ixt-mid { min-width: 0; }
.pt-ixt-row1 { display: flex; align-items: baseline; gap: 8px; justify-content: space-between; }
.pt-ixt-name { font-size: 12.5px; font-weight: 500; color: var(--pt-fg);
  white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
.pt-ixt.is-unread .pt-ixt-name { font-weight: 600; }
.pt-ixt-time { font-size: 10px; color: var(--pt-fg-4); flex-shrink: 0; }
.pt-ixt-row2 {
  display: flex; align-items: center; gap: 6px;
  margin-top: 2px;
}
.pt-ixt-snip {
  font-size: 11.5px; color: var(--pt-fg-3); flex: 1; min-width: 0;
  white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
}
.pt-ixt.is-unread .pt-ixt-snip { color: var(--pt-fg-2); }
.pt-ixt-row3 {
  display: flex; align-items: center; gap: 4px;
  margin-top: 6px; flex-wrap: wrap;
}
.pt-ixt-trust { font-size: 10px; color: var(--pt-fg-4); margin-left: auto; }

/* ── Conversation pane ──────────────────────────────────────────────── */
.pt-ix-conv {
  display: flex; flex-direction: column;
  min-height: 0;
  background: var(--pt-bg);
}
.pt-ix-conv-hd {
  display: flex; align-items: center; justify-content: space-between;
  padding: 8px 18px;
  height: 56px;
  border-bottom: 0.5px solid var(--pt-line);
}
.pt-ix-conv-id { display: flex; align-items: center; gap: 12px; }
.pt-ix-conv-name { font-size: 14px; font-weight: 600; }
.pt-ix-conv-meta {
  display: flex; align-items: center; gap: 6px;
  font-size: 11px; color: var(--pt-fg-3); margin-top: 2px;
}
.pt-ix-conv-meta .pt-dot { width: 3px; height: 3px; background: var(--pt-fg-4); }
.pt-ix-conv-actions { display: flex; align-items: center; gap: 6px; }
.pt-btn-sm { height: 26px; padding: 0 10px; font-size: 11.5px; }

.pt-ix-stream {
  flex: 1; min-height: 0; overflow-y: auto;
  padding: 22px 22px 8px;
  display: flex; flex-direction: column; gap: 4px;
}
.pt-ix-day {
  align-self: center;
  font-size: 10.5px; color: var(--pt-fg-4);
  background: var(--pt-surface);
  border: 0.5px solid var(--pt-line-soft);
  padding: 2px 10px; border-radius: 999px;
  margin: 4px 0 14px;
  font-family: var(--pt-mono);
}

/* bubbles */
.pt-bubble {
  max-width: 62%;
  display: flex; flex-direction: column;
  margin-bottom: 6px;
}
.pt-bubble-them { align-self: flex-start; align-items: flex-start; }
.pt-bubble-me   { align-self: flex-end;   align-items: flex-end; }
.pt-bubble-text {
  padding: 8px 12px;
  border-radius: 14px;
  font-size: 12.5px;
  line-height: 1.45;
  white-space: pre-wrap;
  word-wrap: break-word;
}
.pt-bubble-them .pt-bubble-text {
  background: var(--pt-surface);
  border: 0.5px solid var(--pt-line);
  color: var(--pt-fg);
  border-bottom-left-radius: 4px;
}
.pt-bubble-me .pt-bubble-text {
  background: var(--pt-fg);
  color: var(--pt-bg);
  border-bottom-right-radius: 4px;
}
.pt-ix-wa .pt-bubble-them .pt-bubble-text { background: oklch(0.97 0.02 150); border-color: oklch(0.92 0.04 150); }
.pt-ix-wa .pt-bubble-me .pt-bubble-text { background: var(--pt-wa); color: white; }
.pt-th-dim.pt-root .pt-ix-wa .pt-bubble-them .pt-bubble-text,
.pt-th-dark.pt-root .pt-ix-wa .pt-bubble-them .pt-bubble-text { background: oklch(0.30 0.04 150); border-color: oklch(0.36 0.04 150); }

.pt-ix-tg .pt-bubble-me .pt-bubble-text { background: var(--pt-tg); color: white; }
.pt-ix-tg .pt-bubble-them .pt-bubble-text { background: oklch(0.97 0.02 240); border-color: oklch(0.92 0.04 240); }
.pt-th-dim.pt-root .pt-ix-tg .pt-bubble-them .pt-bubble-text,
.pt-th-dark.pt-root .pt-ix-tg .pt-bubble-them .pt-bubble-text { background: oklch(0.30 0.04 240); border-color: oklch(0.36 0.04 240); }

.pt-bubble-meta {
  font-size: 10px; color: var(--pt-fg-4);
  margin-top: 3px; padding: 0 4px;
  font-family: var(--pt-mono);
}
.pt-bubble.is-optimistic .pt-bubble-text { opacity: 0.6; }
.pt-bubble-pending { color: var(--pt-warn); }
.pt-bubble-read { color: var(--pt-cool); }

/* card / wallet bubble */
.pt-bubble-card .pt-cardbubble {
  background: var(--pt-surface);
  border: 0.5px solid var(--pt-line);
  border-radius: 12px;
  padding: 10px 12px;
  min-width: 280px;
}
.pt-bubble-me.pt-bubble-card .pt-cardbubble { background: var(--pt-surface-2); }
.pt-cardbubble-hd { display: flex; justify-content: space-between; align-items: center; margin-bottom: 6px; }
.pt-cardbubble-asset { font-size: 10.5px; font-weight: 600; color: var(--pt-fg-3); text-transform: uppercase; letter-spacing: 0.05em; }
.pt-cardbubble-amt { font-size: 14px; font-weight: 600; }
.pt-cardbubble-addr {
  font-size: 11px; padding: 6px 8px;
  background: oklch(from var(--pt-fg) l c h / 0.05);
  border-radius: 6px;
  word-break: break-all;
  margin-bottom: 8px;
}
.pt-cardbubble-actions { display: flex; gap: 4px; }
.pt-cardbubble-actions .pt-btn { height: 24px; padding: 0 10px; font-size: 11px; }

/* tx bubble */
.pt-tx {
  background: var(--pt-surface);
  border: 0.5px solid var(--pt-line);
  border-radius: 10px;
  padding: 8px 12px;
}
.pt-tx-row { display: flex; align-items: center; gap: 10px; }
.pt-tx-asset { font-family: var(--pt-mono); font-size: 11px; font-weight: 600; }
.pt-tx-id { font-size: 11px; color: var(--pt-fg-3); }
.pt-tx-state { font-size: 11px; color: var(--pt-warn); display: flex; align-items: center; gap: 4px; margin-left: auto; }

/* typing */
.pt-ix-typing {
  display: flex; align-items: center; gap: 4px;
  align-self: flex-start;
  padding: 6px 12px;
  margin: 4px 0;
  background: var(--pt-surface);
  border: 0.5px solid var(--pt-line);
  border-radius: 14px;
  border-bottom-left-radius: 4px;
}
.pt-typing-dot {
  width: 5px; height: 5px; border-radius: 50%;
  background: var(--pt-fg-4);
  animation: ptTyping 1.2s infinite ease-in-out both;
}
.pt-typing-dot:nth-child(2) { animation-delay: 0.15s; }
.pt-typing-dot:nth-child(3) { animation-delay: 0.30s; }
.pt-typing-lbl { font-size: 11px; color: var(--pt-fg-3); margin-left: 4px; }
@keyframes ptTyping {
  0%, 80%, 100% { transform: translateY(0); opacity: 0.4; }
  40% { transform: translateY(-3px); opacity: 1; }
}

/* ── Composer ───────────────────────────────────────────────────────── */
.pt-ix-composer {
  border-top: 0.5px solid var(--pt-line);
  padding: 10px 18px 14px;
  background: var(--pt-bg);
  flex-shrink: 0;
}
.pt-quicks-bar {
  display: flex; align-items: center; gap: 4px;
  padding-bottom: 8px;
  flex-wrap: wrap;
}
.pt-quicks-lbl { font-size: 10px; text-transform: uppercase; letter-spacing: 0.06em; color: var(--pt-fg-4); margin-right: 4px; }
.pt-quick-more { background: transparent; color: var(--pt-fg-3); border-style: dashed; }

.pt-composer-field {
  border: 0.5px solid var(--pt-line);
  border-radius: 10px;
  background: var(--pt-surface);
  transition: border-color 0.1s, box-shadow 0.1s;
}
.pt-composer-field:focus-within {
  border-color: var(--pt-accent);
  box-shadow: 0 0 0 3px var(--pt-accent-soft);
}
.pt-composer-field textarea {
  width: 100%;
  border: 0; background: transparent; outline: none; resize: none;
  padding: 12px 14px 6px;
  font: inherit; font-size: 13px; color: var(--pt-fg);
  font-family: var(--pt-font);
  line-height: 1.5;
}
.pt-composer-field textarea::placeholder { color: var(--pt-fg-4); }
.pt-composer-tools {
  display: flex; align-items: center; justify-content: space-between;
  padding: 6px 8px 8px;
}
.pt-composer-l { display: flex; align-items: center; gap: 2px; }
.pt-composer-r { display: flex; align-items: center; gap: 8px; }
.pt-composer-sep { width: 1px; height: 16px; background: var(--pt-line); margin: 0 4px; }
.pt-composer-hint { font-size: 10.5px; color: var(--pt-fg-4); font-family: var(--pt-mono); }
.pt-btn:disabled { opacity: 0.5; cursor: not-allowed; }
.pt-btn.is-sending { opacity: 0.7; }

/* ── Conversation right rail ────────────────────────────────────────── */
.pt-ix-rail {
  border-left: 0.5px solid var(--pt-line);
  background: var(--pt-bg-side);
  overflow-y: auto;
  padding: 14px 14px 24px;
  display: flex; flex-direction: column; gap: 16px;
  min-height: 0;
}

.pt-rail-order {
  background: var(--pt-surface);
  border-radius: var(--pt-radius);
  padding: 12px;
  box-shadow: var(--pt-shadow-card);
}
.pt-rail-order-row { display: flex; justify-content: space-between; align-items: center; margin-bottom: 8px; }
.pt-rail-order-id { font-size: 12px; font-weight: 600; }
.pt-rail-items { list-style: none; margin: 0; padding: 0 0 8px; border-bottom: 0.5px solid var(--pt-line-soft); }
.pt-rail-items li {
  display: grid; grid-template-columns: 1fr auto auto;
  gap: 10px; font-size: 11.5px; padding: 3px 0;
}
.pt-rail-order-meta {
  display: grid; grid-template-columns: 1fr 1fr;
  gap: 6px; padding: 8px 0;
  border-bottom: 0.5px solid var(--pt-line-soft);
  font-size: 11px;
}
.pt-rail-order-meta .lbl { display: block; font-size: 9.5px; text-transform: uppercase; letter-spacing: 0.05em; color: var(--pt-fg-4); }
.pt-rail-order-pay { padding-top: 10px; }
.pt-rail-pay-row { display: flex; align-items: center; gap: 8px; }
.pt-rail-pay-mid { flex: 1; min-width: 0; }
.pt-rail-pay-state { font-size: 10.5px; color: var(--pt-fg-3); margin-bottom: 4px; }

.pt-rail-note {
  background: var(--pt-surface);
  border: 0.5px solid var(--pt-line-soft);
  border-radius: 7px;
  padding: 8px 10px;
  font-size: 11.5px; color: var(--pt-fg-2);
  line-height: 1.45;
}
.pt-rail-note-meta { font-size: 10px; color: var(--pt-fg-4); font-family: var(--pt-mono); margin-bottom: 3px; }

.pt-rail-activity { list-style: none; margin: 0; padding: 0; display: flex; flex-direction: column; gap: 8px; }
.pt-rail-activity li {
  display: grid; grid-template-columns: 14px 1fr;
  gap: 8px; align-items: flex-start;
  font-size: 11.5px;
}
.pt-act-dot { width: 6px; height: 6px; border-radius: 50%; background: var(--pt-fg-4); margin-top: 5px; }
.pt-act-time { font-size: 10px; color: var(--pt-fg-4); font-family: var(--pt-mono); margin-top: 1px; }


/* ===== broadcast.css ===== */
/* broadcast.css */

.pt-bc {
  height: calc(100vh - 48px);
  display: flex; flex-direction: column;
  overflow: hidden;
  background: var(--pt-bg);
}
.pt-bc-hd {
  display: flex; align-items: center; gap: 14px;
  padding: 14px 22px;
  border-bottom: 0.5px solid var(--pt-line);
}
.pt-bc-hd-title { flex: 1; }
.pt-bc-hd-title h1 { margin: 0; font-size: 18px; font-weight: 600; letter-spacing: -0.015em; }
.pt-bc-hd-title p { margin: 2px 0 0; font-size: 12px; color: var(--pt-fg-3); }
.pt-bc-hd-actions { display: flex; gap: 8px; }

.pt-bc-body {
  flex: 1; min-height: 0;
  display: grid;
  grid-template-columns: 1fr 380px;
  overflow: hidden;
}
.pt-bc-compose {
  overflow-y: auto;
  padding: 22px 28px 32px;
  display: flex; flex-direction: column; gap: 24px;
  border-right: 0.5px solid var(--pt-line);
}
.pt-bc-step {
  background: var(--pt-surface);
  border-radius: var(--pt-radius);
  box-shadow: var(--pt-shadow-card);
  padding: 16px 18px;
}
.pt-bc-step-hd {
  display: flex; align-items: flex-start; gap: 12px;
  margin-bottom: 14px;
}
.pt-bc-step-n {
  font-family: var(--pt-mono); font-size: 11px; font-weight: 600;
  color: var(--pt-accent-fg);
  background: var(--pt-accent-soft);
  padding: 3px 7px; border-radius: 5px;
  letter-spacing: 0.04em;
}
.pt-bc-step h3 { margin: 0; font-size: 13.5px; font-weight: 600; }
.pt-bc-step-hd p { margin: 1px 0 0; font-size: 11.5px; color: var(--pt-fg-3); }

/* Audience */
.pt-bc-aud-grid {
  display: grid; grid-template-columns: repeat(3, 1fr); gap: 6px;
  margin-bottom: 14px;
}
.pt-bc-aud {
  display: flex; align-items: center; justify-content: space-between;
  padding: 9px 11px;
  border: 0.5px solid var(--pt-line);
  border-radius: 7px;
  background: var(--pt-surface);
  cursor: pointer;
  text-align: left;
}
.pt-bc-aud:hover { background: var(--pt-surface-2); }
.pt-bc-aud.is-on {
  background: var(--pt-accent-soft);
  border-color: var(--pt-accent);
  box-shadow: 0 0 0 1px var(--pt-accent) inset;
}
.pt-bc-aud-lbl { font-size: 11.5px; font-weight: 500; }
.pt-bc-aud.is-on .pt-bc-aud-lbl { color: var(--pt-accent-fg); }
.pt-bc-aud-cnt { font-size: 11px; color: var(--pt-fg-3); }
.pt-bc-aud.is-on .pt-bc-aud-cnt { color: var(--pt-accent-fg); }

.pt-bc-excl {
  border-top: 0.5px solid var(--pt-line-soft);
  padding-top: 12px;
}
.pt-bc-excl-hd { font-size: 10.5px; text-transform: uppercase; letter-spacing: 0.06em; color: var(--pt-fg-4); margin-bottom: 6px; }
.pt-bc-excl-row {
  display: flex; align-items: center; gap: 8px;
  padding: 5px 0;
  font-size: 12px;
  cursor: pointer;
}
.pt-bc-excl-row input { accent-color: var(--pt-accent); }
.pt-bc-excl-row > span:nth-child(2) { flex: 1; }
.pt-bc-excl-cnt { font-size: 11px; color: var(--pt-danger); }

/* Channels */
.pt-bc-chans { display: grid; grid-template-columns: repeat(3, 1fr); gap: 6px; }
.pt-bc-chan {
  display: flex; align-items: center; gap: 10px;
  padding: 10px 12px;
  border: 0.5px solid var(--pt-line);
  border-radius: 7px;
  background: var(--pt-surface);
  cursor: pointer;
  text-align: left;
}
.pt-bc-chan.is-on { background: var(--pt-accent-soft); border-color: var(--pt-accent); }
.pt-bc-chan.pt-chip-wa.is-on { background: oklch(from var(--pt-wa) 0.96 0.04 h); border-color: var(--pt-wa); }
.pt-bc-chan.pt-chip-tg.is-on { background: oklch(from var(--pt-tg) 0.96 0.04 h); border-color: var(--pt-tg); }
.pt-th-dim .pt-bc-chan.pt-chip-wa.is-on, .pt-th-dark .pt-bc-chan.pt-chip-wa.is-on { background: oklch(from var(--pt-wa) 0.30 0.05 h); }
.pt-th-dim .pt-bc-chan.pt-chip-tg.is-on, .pt-th-dark .pt-bc-chan.pt-chip-tg.is-on { background: oklch(from var(--pt-tg) 0.30 0.05 h); }
.pt-bc-chan > svg:first-child { flex-shrink: 0; }
.pt-bc-chan.pt-chip-wa svg { color: var(--pt-wa); }
.pt-bc-chan.pt-chip-tg svg { color: var(--pt-tg); }
.pt-bc-chan.pt-chip-em svg { color: var(--pt-em); }
.pt-bc-chan > div { flex: 1; }
.pt-bc-chan-name { font-size: 12px; font-weight: 500; }
.pt-bc-chan-note { font-size: 10.5px; color: var(--pt-fg-3); margin-top: 1px; }
.pt-bc-chan-tick {
  width: 16px; height: 16px; border-radius: 4px;
  border: 1px solid var(--pt-line);
  display: grid; place-items: center;
  background: var(--pt-bg);
}
.pt-bc-chan-tick.is-on { background: var(--pt-fg); color: var(--pt-bg); border-color: transparent; }

/* Templates + body */
.pt-bc-tpls { display: grid; grid-template-columns: repeat(4, 1fr); gap: 6px; margin-bottom: 10px; }
.pt-bc-tpl {
  padding: 8px 10px;
  border: 0.5px solid var(--pt-line);
  border-radius: 6px;
  background: var(--pt-surface);
  cursor: pointer;
  text-align: left;
}
.pt-bc-tpl.is-on { border-color: var(--pt-accent); background: var(--pt-accent-soft); }
.pt-bc-tpl-lbl { font-size: 11.5px; font-weight: 500; }
.pt-bc-tpl-hint { font-size: 10.5px; color: var(--pt-fg-3); margin-top: 1px; }

/* Schedule */
.pt-bc-sched-pills { width: 100%; }
.pt-bc-sched-pills .pt-pill { flex: 1; padding: 5px 10px; font-size: 11.5px; justify-content: center; }
.pt-bc-stagger {
  display: flex; align-items: center; gap: 10px;
  padding: 10px 12px; margin-top: 10px;
  border: 0.5px solid var(--pt-line);
  border-radius: 7px;
  background: var(--pt-surface);
  cursor: pointer;
}
.pt-bc-stagger input { accent-color: var(--pt-accent); }
.pt-bc-stagger-lbl { font-size: 12px; font-weight: 500; }
.pt-bc-stagger-hint { font-size: 11px; color: var(--pt-fg-3); margin-top: 1px; }

/* Preview rail */
.pt-bc-preview {
  background: var(--pt-bg-side);
  padding: 22px 18px 22px;
  overflow-y: auto;
  display: flex; flex-direction: column; gap: 12px;
}
.pt-bc-preview-hd {
  display: flex; justify-content: space-between; align-items: center;
  font-size: 10.5px; text-transform: uppercase; letter-spacing: 0.06em;
  color: var(--pt-fg-3); margin-bottom: 4px;
}
.pt-bc-preview-meta { color: var(--pt-fg-4); }
.pt-bc-preview-empty {
  padding: 30px 16px; text-align: center;
  color: var(--pt-fg-4); font-size: 12px;
  border: 0.5px dashed var(--pt-line);
  border-radius: 8px;
}
.pt-bc-prev {
  background: var(--pt-surface);
  border: 0.5px solid var(--pt-line);
  border-radius: 8px;
  padding: 10px 12px;
}
.pt-bc-prev-hd {
  display: flex; align-items: center; gap: 6px;
  font-size: 10.5px; color: var(--pt-fg-3);
  margin-bottom: 8px;
  padding-bottom: 6px;
  border-bottom: 0.5px solid var(--pt-line-soft);
}
.pt-bc-prev-hd .pt-bc-prev-ch { font-weight: 500; color: var(--pt-fg-2); }
.pt-bc-prev-to { margin-left: auto; font-family: var(--pt-mono); }
.pt-bc-prev .pt-bubble { max-width: 100%; align-self: flex-start; }
.pt-bc-prev .pt-bubble-me { align-self: flex-end; align-items: flex-end; }
.pt-bc-prev .pt-bubble-text { font-size: 12px; }

.pt-bc-summary {
  margin-top: 8px; padding: 14px;
  background: var(--pt-surface);
  border-radius: var(--pt-radius);
  box-shadow: var(--pt-shadow-card);
}
.pt-bc-summary-row {
  display: flex; justify-content: space-between; align-items: center;
  padding: 5px 0;
  font-size: 12px;
}
.pt-bc-summary-row .lbl { color: var(--pt-fg-3); }
.pt-bc-summary-row .val { font-weight: 500; }
.pt-bc-risk-low { display: inline-flex; align-items: center; gap: 5px; color: var(--pt-ok); }
.pt-bc-send { width: 100%; justify-content: center; margin-top: 12px; height: 36px; font-size: 13px; }
.pt-bc-warn { font-size: 10.5px; color: var(--pt-fg-4); text-align: center; margin-top: 8px; font-style: italic; }

/* Sent state */
.pt-bc-sent {
  flex: 1; display: flex; flex-direction: column;
  align-items: center; justify-content: center;
  text-align: center; gap: 12px;
  padding: 40px;
}
.pt-bc-sent-mark {
  width: 64px; height: 64px; border-radius: 50%;
  background: var(--pt-accent-soft);
  color: var(--pt-accent-fg);
  display: grid; place-items: center;
  margin-bottom: 8px;
}
.pt-bc-sent h2 { margin: 0; font-size: 22px; font-weight: 600; letter-spacing: -0.015em; }
.pt-bc-sent p { margin: 0; color: var(--pt-fg-3); font-size: 13px; max-width: 420px; }
.pt-bc-sent-stats {
  display: flex; gap: 24px;
  margin: 16px 0 8px;
  padding: 14px 22px;
  background: var(--pt-surface);
  border-radius: var(--pt-radius);
  box-shadow: var(--pt-shadow-card);
}
.pt-bc-sent-stats .lbl { font-size: 10.5px; color: var(--pt-fg-4); text-transform: uppercase; letter-spacing: 0.05em; }
.pt-bc-sent-stats .val { font-size: 16px; font-weight: 600; margin-top: 2px; font-variant-numeric: tabular-nums; }
.pt-bc-sent-stats .val span { font-size: 11px; color: var(--pt-fg-4); font-weight: 400; margin-left: 4px; }

/* empty section helper */
.pt-empty {
  display: flex; flex-direction: column; align-items: center; justify-content: center;
  height: 100%; gap: 12px; padding: 40px; text-align: center;
}
.pt-empty-mark { font-size: 18px; font-weight: 600; }
.pt-empty-cap { font-size: 13px; color: var(--pt-fg-3); }




/* ===== customer.css ===== */
/* customer.css */
.pt-cu { height: calc(100vh - 48px); display: flex; flex-direction: column; overflow: hidden; }
.pt-cu-hd {
  display: flex; align-items: center; gap: 14px;
  padding: 14px 22px; border-bottom: 0.5px solid var(--pt-line);
}
.pt-cu-hd-id { display: flex; align-items: center; gap: 12px; flex: 1; }
.pt-cu-hd-av {
  width: 42px; height: 42px; border-radius: 9px;
  background: var(--pt-surface-2); border: 0.5px solid var(--pt-line);
  display: grid; place-items: center; font-weight: 600; font-size: 14px;
  color: var(--pt-fg-2);
}
.pt-cu-hd-av[data-channel="wa"] { color: var(--pt-wa); }
.pt-cu-hd-av[data-channel="tg"] { color: var(--pt-tg); }
.pt-cu-hd-name { font-size: 16px; font-weight: 600; letter-spacing: -0.01em; display: flex; align-items: center; gap: 7px; }
.pt-cu-hd-handle { font-size: 11.5px; color: var(--pt-fg-3); margin-top: 2px; }
.pt-cu-hd-actions { display: flex; gap: 8px; }

.pt-cu-body { flex: 1; min-height: 0; overflow-y: auto; padding: 18px 22px 28px; }

.pt-cu-strip {
  display: grid; grid-template-columns: repeat(6, 1fr); gap: 10px;
  margin-bottom: 16px;
}
.pt-cu-stat {
  background: var(--pt-surface);
  border-radius: var(--pt-radius);
  padding: 10px 12px;
  box-shadow: var(--pt-shadow-card);
}
.pt-cu-stat .lbl { font-size: 10px; color: var(--pt-fg-4); text-transform: uppercase; letter-spacing: 0.05em; font-weight: 500; }
.pt-cu-stat .val { font-size: 18px; font-weight: 600; margin-top: 3px; font-variant-numeric: tabular-nums; letter-spacing: -0.01em; }
.pt-cu-stat .val span { font-size: 11px; color: var(--pt-fg-4); font-weight: 400; margin-left: 1px; }
.pt-cu-stat-ch { display: flex; align-items: center; gap: 5px; font-size: 13px; }
.pt-cu-trust.pt-trust-hi .val { color: var(--pt-ok); }
.pt-cu-trust.pt-trust-md .val { color: var(--pt-warn); }
.pt-cu-trust.pt-trust-lo .val { color: var(--pt-danger); }

.pt-cu-grid { display: grid; grid-template-columns: minmax(0, 1.45fr) minmax(0, 1fr); gap: 14px; }
.pt-cu-col { display: flex; flex-direction: column; gap: 14px; min-width: 0; }

/* Order history table */
.pt-cu-orders { width: 100%; border-collapse: collapse; }
.pt-cu-orders th, .pt-cu-orders td {
  padding: 8px 12px; text-align: left;
  border-top: 0.5px solid var(--pt-line-soft);
  font-size: 12px;
}
.pt-cu-orders th {
  border-top: 0; border-bottom: 0.5px solid var(--pt-line);
  font-size: 10.5px; font-weight: 500; color: var(--pt-fg-4);
  text-transform: uppercase; letter-spacing: 0.04em;
}
.pt-cu-orders .r { text-align: right; }
.pt-cu-items { color: var(--pt-fg-2); }
.pt-cu-orders tbody tr:hover { background: oklch(from var(--pt-fg) l c h / 0.025); }
.pt-cu-state { display: inline-flex; align-items: center; gap: 5px; font-size: 11px; }
.pt-cu-state i { width: 6px; height: 6px; border-radius: 50%; background: var(--pt-fg-4); }
.pt-cu-state-ok { color: var(--pt-ok); } .pt-cu-state-ok i { background: var(--pt-ok); }
.pt-cu-state-warn { color: var(--pt-warn); } .pt-cu-state-warn i { background: var(--pt-warn); }
.pt-cu-state-cool { color: var(--pt-cool); } .pt-cu-state-cool i { background: var(--pt-cool); }

/* Cycles */
.pt-cu-cycles { list-style: none; margin: 0; padding: 0; }
.pt-cu-cycle {
  display: grid; grid-template-columns: 80px 1fr auto;
  align-items: center; gap: 12px;
  padding: 10px 14px;
  border-top: 0.5px solid var(--pt-line-soft);
}
.pt-cu-cycle:first-child { border-top: 0; }
.pt-cu-cycle-prod { font-size: 12px; font-weight: 500; }
.pt-cu-cycle-bar {
  position: relative; height: 6px; border-radius: 999px;
  background: oklch(from var(--pt-fg) l c h / 0.07);
  overflow: visible;
}
.pt-cu-cycle-fill { height: 100%; background: var(--pt-accent); border-radius: 999px; }
.pt-cu-cycle-marker {
  position: absolute; top: -3px; width: 12px; height: 12px;
  background: var(--pt-bg); border: 2px solid var(--pt-accent);
  border-radius: 50%; transform: translateX(-50%);
}
.pt-cu-cycle-meta { font-size: 10.5px; color: var(--pt-fg-3); }

/* Notes */
.pt-cu-notes { list-style: none; margin: 0; padding: 0; }
.pt-cu-notes li {
  padding: 10px 14px;
  border-top: 0.5px solid var(--pt-line-soft);
}
.pt-cu-notes li:first-child { border-top: 0; }
.pt-cu-note-at { font-size: 10.5px; color: var(--pt-fg-4); margin-bottom: 3px; }
.pt-cu-note-text { font-size: 12.5px; color: var(--pt-fg); line-height: 1.5; }

/* Trust factors */
.pt-cu-factors { list-style: none; margin: 0; padding: 0; }
.pt-cu-factors li { padding: 9px 14px; border-top: 0.5px solid var(--pt-line-soft); }
.pt-cu-factors li:first-child { border-top: 0; }
.pt-cu-factor-row1 { display: flex; align-items: center; gap: 8px; margin-bottom: 5px; }
.pt-cu-factor-lbl { font-size: 12px; flex: 1; }
.pt-cu-factor-v { font-size: 11px; color: var(--pt-fg-3); }
.pt-cu-factor-w { font-size: 10px; color: var(--pt-fg-4); background: oklch(from var(--pt-fg) l c h / 0.05); padding: 1px 5px; border-radius: 4px; }
.pt-cu-factor-bar { height: 4px; background: oklch(from var(--pt-fg) l c h / 0.06); border-radius: 999px; overflow: hidden; }
.pt-cu-factor-fill { height: 100%; background: var(--pt-accent); border-radius: 999px; }
.pt-cu-factor-fill.is-neg { background: var(--pt-danger); }

/* Details DL */
.pt-cu-dl { display: grid; grid-template-columns: 90px 1fr; gap: 4px 12px; margin: 0; padding: 12px 14px; }
.pt-cu-dl dt { font-size: 10.5px; color: var(--pt-fg-4); text-transform: uppercase; letter-spacing: 0.05em; padding-top: 3px; }
.pt-cu-dl dd { margin: 0; font-size: 12.5px; padding-bottom: 8px; border-bottom: 0.5px solid var(--pt-line-soft); }
.pt-cu-dl dd:last-of-type { border-bottom: 0; padding-bottom: 0; }
.pt-cu-tags { display: flex; flex-wrap: wrap; gap: 4px; align-items: center; }
.pt-cu-add-tag {
  width: 18px; height: 18px; border-radius: 4px;
  border: 0.5px dashed var(--pt-line); background: transparent;
  color: var(--pt-fg-3); cursor: pointer; font-size: 12px; line-height: 1;
}
.pt-cu-pay-list { list-style: none; margin: 0; padding: 0; display: flex; flex-direction: column; gap: 3px; }

/* Activity */
.pt-cu-act { list-style: none; margin: 0; padding: 12px 14px; display: flex; flex-direction: column; gap: 7px; }
.pt-cu-act li { display: flex; align-items: flex-start; gap: 9px; font-size: 12px; }
.pt-cu-act-dot { width: 7px; height: 7px; border-radius: 50%; background: var(--pt-fg-4); margin-top: 6px; flex-shrink: 0; }
.pt-cu-act li b { font-weight: 500; }



/* ===== orders.css ===== */
/* orders.css */
.pt-or { height: calc(100vh - 48px); display: flex; flex-direction: column; overflow: hidden; }

.pt-or-hd {
  display: flex; align-items: flex-start; gap: 14px;
  padding: 18px 22px 12px;
  border-bottom: 0.5px solid var(--pt-line);
}
.pt-or-hd > div:first-child { flex: 1; }
.pt-or-hd h1 { font-size: 18px; font-weight: 600; letter-spacing: -0.015em; margin: 0; }
.pt-or-hd p { font-size: 12px; color: var(--pt-fg-3); margin: 2px 0 0; }
.pt-or-hd-actions { display: flex; gap: 8px; align-items: center; }
.pt-or-search {
  display: flex; align-items: center; gap: 6px;
  height: 28px; padding: 0 10px;
  border: 0.5px solid var(--pt-line); border-radius: 6px;
  background: var(--pt-surface);
  color: var(--pt-fg-3);
  width: 220px;
}
.pt-or-search input { background: none; border: 0; outline: 0; font-size: 12px; flex: 1; color: var(--pt-fg); }
.pt-or-search input::placeholder { color: var(--pt-fg-4); }

/* Board ─ horizontally scrolling kanban columns */
.pt-or-board {
  flex: 1; min-height: 0;
  display: grid;
  grid-template-columns: repeat(5, minmax(260px, 1fr));
  gap: 12px;
  padding: 14px 22px 22px;
  overflow-x: auto;
  overflow-y: hidden;
}

.pt-or-col {
  background: var(--pt-bg-side);
  border: 0.5px solid var(--pt-line);
  border-radius: var(--pt-radius);
  display: flex; flex-direction: column;
  min-height: 0;
  transition: background 0.15s, border-color 0.15s;
}
.pt-or-col.is-over { background: var(--pt-accent-soft); border-color: var(--pt-accent); }
.pt-or-col.is-blocked { background: oklch(from var(--pt-danger) l c h / 0.10); border-color: oklch(from var(--pt-danger) l c h / 0.55); }

.pt-or-col-hd {
  padding: 12px 12px 10px;
  border-bottom: 0.5px solid var(--pt-line);
}
.pt-or-col-titlewrap { display: flex; align-items: center; gap: 7px; }
.pt-or-col-dot { width: 7px; height: 7px; border-radius: 50%; background: var(--pt-fg-4); flex-shrink: 0; }
.pt-or-dot-awaiting   { background: var(--pt-fg-4); }
.pt-or-dot-confirming { background: var(--pt-warn); }
.pt-or-dot-packing    { background: var(--pt-cool); }
.pt-or-dot-shipped    { background: oklch(0.66 0.12 280); }
.pt-or-dot-delivered  { background: var(--pt-ok); }

.pt-or-col-title { font-size: 12px; font-weight: 600; letter-spacing: -0.005em; flex: 1; }
.pt-or-col-count {
  font-size: 11px; color: var(--pt-fg-3);
  background: var(--pt-surface);
  border: 0.5px solid var(--pt-line-soft);
  border-radius: 999px;
  padding: 1px 7px; min-width: 22px; text-align: center;
}
.pt-or-col-cap { font-size: 10.5px; color: var(--pt-fg-4); margin-top: 4px; padding-left: 14px; }

.pt-or-col-body {
  flex: 1; min-height: 0;
  overflow-y: auto;
  padding: 8px 8px 12px;
  display: flex; flex-direction: column; gap: 7px;
}
.pt-or-col-body::-webkit-scrollbar { width: 6px; }
.pt-or-col-body::-webkit-scrollbar-thumb { background: oklch(from var(--pt-fg) l c h / 0.12); border-radius: 999px; }
.pt-or-col-empty {
  font-size: 11px; color: var(--pt-fg-4);
  text-align: center;
  padding: 24px 0;
  border: 0.5px dashed var(--pt-line); border-radius: 6px;
  margin: 6px 4px;
}

/* Card */
.pt-or-card {
  background: var(--pt-surface);
  border: 0.5px solid var(--pt-line);
  border-radius: 7px;
  padding: 10px 11px;
  display: flex; flex-direction: column; gap: 6px;
  cursor: grab;
  box-shadow: var(--pt-shadow);
  transition: transform 0.12s, box-shadow 0.12s, border-color 0.12s;
}
.pt-or-card:hover { border-color: oklch(from var(--pt-fg) l c h / 0.18); }
.pt-or-card:active { cursor: grabbing; }
.pt-or-card.is-dragging { opacity: 0.4; transform: rotate(1.5deg); }
.pt-or-card.pt-or-pulse-ok {
  animation: ptOrPulseOk 0.7s ease-out;
}
.pt-or-card.pt-or-pulse-err {
  animation: ptOrPulseErr 0.5s ease-out;
}
@keyframes ptOrPulseOk {
  0%   { box-shadow: 0 0 0 2px oklch(from var(--pt-ok) l c h / 0.5); }
  100% { box-shadow: var(--pt-shadow); }
}
@keyframes ptOrPulseErr {
  0%, 100% { transform: translateX(0); }
  20% { transform: translateX(-4px); }
  40% { transform: translateX(4px); }
  60% { transform: translateX(-3px); }
  80% { transform: translateX(2px); }
}

.pt-or-card-hd { display: flex; align-items: center; justify-content: space-between; }
.pt-or-card-id { font-size: 11px; font-weight: 600; color: var(--pt-fg-2); }
.pt-or-card-age { font-size: 10.5px; color: var(--pt-fg-4); }

.pt-or-card-cust { display: flex; align-items: center; gap: 7px; }
.pt-or-card-av {
  width: 22px; height: 22px; border-radius: 5px;
  background: var(--pt-surface-2); border: 0.5px solid var(--pt-line);
  display: grid; place-items: center; font-size: 9.5px; font-weight: 600;
  color: var(--pt-fg-2);
  position: relative; flex-shrink: 0;
}
.pt-or-card-av .pt-thread-ch {
  position: absolute; bottom: -2px; right: -2px;
  width: 12px; height: 12px;
  background: var(--pt-surface);
  border-radius: 50%;
  display: grid; place-items: center;
}
.pt-or-card-name { font-size: 12px; font-weight: 500; flex: 1; min-width: 0;
  overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }

.pt-or-card-items { font-size: 11.5px; color: var(--pt-fg-2); line-height: 1.4; }

.pt-or-card-pay { display: flex; align-items: center; justify-content: space-between; gap: 8px; }
.pt-or-card-amt { font-size: 13px; font-weight: 600; font-variant-numeric: tabular-nums; }

/* State footer */
.pt-or-card-state {
  display: flex; align-items: center; gap: 6px;
  font-size: 10.5px; color: var(--pt-fg-3);
  padding-top: 5px;
  border-top: 0.5px solid var(--pt-line-soft);
}
.pt-or-state-pack  { color: var(--pt-cool); }
.pt-or-state-ship  { color: oklch(0.55 0.10 280); }
.pt-or-state-done  { color: var(--pt-ok); }

/* Confirmation strip */
.pt-or-card-confirm {
  padding-top: 6px;
  border-top: 0.5px solid var(--pt-line-soft);
  display: flex; flex-direction: column; gap: 5px;
}
.pt-or-confirm-row { display: flex; align-items: center; justify-content: space-between; gap: 8px; }
.pt-or-confirm-tx { font-size: 10px; color: var(--pt-fg-4); }
.pt-or-confirm-ct { font-size: 11px; font-weight: 600; color: var(--pt-warn); }
.pt-or-confirm-bar {
  display: grid; grid-auto-flow: column; grid-auto-columns: 1fr;
  gap: 2px;
}
.pt-or-confirm-tick {
  height: 4px; border-radius: 2px;
  background: oklch(from var(--pt-fg) l c h / 0.08);
  transition: background 0.3s;
}
.pt-or-confirm-tick.is-on { background: var(--pt-warn); }
.pt-or-confirm-tick.is-on.is-ready { background: var(--pt-ok); }
.pt-or-confirm-cap {
  display: flex; align-items: center; gap: 5px;
  font-size: 10px; color: var(--pt-fg-4);
}
.pt-or-card-confirming:has(.pt-or-confirm-tick.is-ready) .pt-or-confirm-ct { color: var(--pt-ok); }

/* Advance button */
.pt-or-advance {
  background: oklch(from var(--pt-fg) l c h / 0.04);
  border: 0.5px solid var(--pt-line);
  border-radius: 5px;
  padding: 5px 8px;
  font-size: 11px;
  color: var(--pt-fg-2);
  cursor: pointer;
  transition: background 0.12s, color 0.12s, border-color 0.12s;
}
.pt-or-advance:hover {
  background: var(--pt-accent-soft);
  border-color: var(--pt-accent);
  color: var(--pt-accent-fg);
}

/* Toast */
.pt-or-toast {
  position: fixed; bottom: 22px; left: 50%; transform: translateX(-50%);
  display: flex; align-items: center; gap: 8px;
  padding: 9px 13px;
  background: var(--pt-fg); color: var(--pt-bg);
  border-radius: 7px;
  font-size: 12px;
  box-shadow: 0 4px 16px oklch(from var(--pt-fg) l c h / 0.25);
  z-index: 9999;
  animation: ptOrToast 0.25s ease-out;
}
.pt-or-toast-err { background: var(--pt-danger); color: white; }
@keyframes ptOrToast {
  from { transform: translate(-50%, 8px); opacity: 0; }
  to   { transform: translate(-50%, 0);   opacity: 1; }
}

/* Smaller column widths for compact mode */
.pt-d-compact .pt-or-board { grid-template-columns: repeat(5, minmax(230px, 1fr)); gap: 10px; padding: 10px 18px; }
.pt-d-compact .pt-or-card { padding: 8px 9px; gap: 5px; }



/* ===== catalog.css ===== */
/* catalog.css */
.pt-cat { height: calc(100vh - 48px); display: flex; flex-direction: column; overflow: hidden; }

.pt-cat-hd {
  display: flex; align-items: flex-start; gap: 14px;
  padding: 18px 22px 10px;
  border-bottom: 0.5px solid var(--pt-line);
}
.pt-cat-hd > div:first-child { flex: 1; }
.pt-cat-hd h1 { font-size: 18px; font-weight: 600; letter-spacing: -0.015em; margin: 0; }
.pt-cat-hd p { font-size: 12px; color: var(--pt-fg-3); margin: 2px 0 0; }
.pt-cat-hd-actions { display: flex; gap: 8px; }

/* Toolbar */
.pt-cat-toolbar {
  display: flex; align-items: center; gap: 14px;
  padding: 10px 22px;
  border-bottom: 0.5px solid var(--pt-line);
  background: var(--pt-bg-side);
}
.pt-cat-filters { display: flex; gap: 4px; flex: 1; flex-wrap: wrap; }
.pt-cat-filter {
  background: transparent; border: 0.5px solid transparent;
  padding: 4px 9px; border-radius: 5px;
  font-size: 11.5px; color: var(--pt-fg-3);
  cursor: pointer;
}
.pt-cat-filter:hover { background: var(--pt-surface); }
.pt-cat-filter.is-active {
  background: var(--pt-surface); border-color: var(--pt-line);
  color: var(--pt-fg); font-weight: 500;
}
.pt-cat-sort { display: flex; align-items: center; gap: 6px; }
.pt-cat-sort-lbl { font-size: 11px; color: var(--pt-fg-4); text-transform: uppercase; letter-spacing: 0.05em; }
.pt-cat-sort-sel {
  font-family: inherit;
  font-size: 11.5px;
  background: var(--pt-surface);
  border: 0.5px solid var(--pt-line);
  border-radius: 5px;
  padding: 4px 8px;
  color: var(--pt-fg);
  cursor: pointer;
}

/* Body — split pane */
.pt-cat-body {
  flex: 1; min-height: 0;
  display: grid;
  grid-template-columns: minmax(0, 1.4fr) minmax(360px, 1fr);
  overflow: hidden;
}

/* List */
.pt-cat-list {
  border-right: 0.5px solid var(--pt-line);
  display: flex; flex-direction: column;
  min-height: 0; min-width: 0;
}
.pt-cat-list-head {
  display: grid;
  grid-template-columns:
    minmax(0, 1.6fr) minmax(140px, 0.9fr) minmax(120px, 0.7fr)
    70px 60px 60px;
  gap: 10px;
  padding: 8px 18px;
  font-size: 10px; color: var(--pt-fg-4);
  text-transform: uppercase; letter-spacing: 0.05em; font-weight: 500;
  border-bottom: 0.5px solid var(--pt-line);
  background: var(--pt-bg);
}
.pt-cat-list ul { list-style: none; margin: 0; padding: 0; flex: 1; overflow-y: auto; }
.pt-cat-row {
  display: grid;
  grid-template-columns:
    minmax(0, 1.6fr) minmax(140px, 0.9fr) minmax(120px, 0.7fr)
    70px 60px 60px;
  gap: 10px;
  align-items: center;
  padding: 10px 18px;
  border-bottom: 0.5px solid var(--pt-line-soft);
  cursor: pointer;
  transition: background 0.1s;
  position: relative;
}
.pt-cat-row:hover { background: var(--pt-bg-side); }
.pt-cat-row.is-active {
  background: var(--pt-accent-soft);
}
.pt-cat-row.is-active::before {
  content: ""; position: absolute; left: 0; top: 0; bottom: 0; width: 2px;
  background: var(--pt-accent);
}
.pt-cat-row-critical::after,
.pt-cat-row-oos::after {
  content: ""; position: absolute; right: 0; top: 0; bottom: 0; width: 2px;
  background: var(--pt-danger);
}
.pt-cat-row-low::after {
  content: ""; position: absolute; right: 0; top: 0; bottom: 0; width: 2px;
  background: var(--pt-warn);
}

.pt-cat-cell-name { min-width: 0; }
.pt-cat-name-main { display: flex; align-items: center; gap: 8px; }
.pt-cat-cat-pill {
  font-size: 9.5px; font-weight: 500;
  padding: 1px 6px; border-radius: 3px;
  text-transform: uppercase; letter-spacing: 0.04em;
  background: oklch(from var(--pt-fg) l c h / 0.05);
  color: var(--pt-fg-3);
  flex-shrink: 0;
}
.pt-cat-cat-pill[data-cat="GLP-1"]    { background: oklch(0.95 0.05 30); color: oklch(0.45 0.15 30); }
.pt-cat-cat-pill[data-cat="Healing"]  { background: oklch(0.95 0.05 145); color: oklch(0.40 0.13 145); }
.pt-cat-cat-pill[data-cat="Cosmetic"] { background: oklch(0.95 0.05 320); color: oklch(0.45 0.15 320); }
.pt-cat-cat-pill[data-cat="Mito"]     { background: oklch(0.95 0.05 240); color: oklch(0.45 0.15 240); }
.pt-cat-cat-pill[data-cat="GH"]       { background: oklch(0.95 0.05 90);  color: oklch(0.40 0.13 90);  }
.pt-cat-prod-name { font-size: 13px; font-weight: 500;
  overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
.pt-cat-sku { font-size: 10.5px; color: var(--pt-fg-4); margin-top: 3px; padding-left: 0; }

.pt-cat-cell-stock { min-width: 0; }
.pt-cat-stock-row { display: flex; align-items: center; gap: 6px; margin-bottom: 4px; }
.pt-cat-stock-num { font-size: 13px; font-weight: 500; }
.pt-cat-flag {
  font-size: 9.5px; padding: 1px 5px; border-radius: 3px;
  text-transform: uppercase; letter-spacing: 0.04em; font-weight: 500;
}
.pt-cat-flag-low      { background: oklch(0.95 0.05 65); color: oklch(0.42 0.13 65); }
.pt-cat-flag-critical { background: oklch(0.94 0.06 25); color: oklch(0.45 0.16 25); }
.pt-cat-flag-oos      { background: oklch(0.92 0.005 100); color: oklch(0.40 0.005 100); }

.pt-cat-stock-bar {
  position: relative; height: 4px; border-radius: 2px;
  background: oklch(from var(--pt-fg) l c h / 0.07);
  overflow: hidden;
}
.pt-cat-stock-fill { height: 100%; background: var(--pt-ok); border-radius: 2px; transition: width 0.3s; }
.pt-cat-stock-fill.is-low      { background: var(--pt-warn); }
.pt-cat-stock-fill.is-critical { background: var(--pt-danger); }
.pt-cat-stock-fill.is-oos      { background: var(--pt-fg-4); }
.pt-cat-stock-thr {
  position: absolute; top: -2px; bottom: -2px; width: 1px;
  background: oklch(from var(--pt-fg) l c h / 0.4);
  pointer-events: none;
}
.pt-cat-stock-thr::before, .pt-cat-stock-thr::after {
  content: ""; position: absolute; left: -1px; width: 3px; height: 1px;
  background: oklch(from var(--pt-fg) l c h / 0.4);
}
.pt-cat-stock-thr::before { top: 0; }
.pt-cat-stock-thr::after  { bottom: 0; }

.pt-cat-cell-velocity { display: flex; align-items: center; gap: 8px; }
.pt-cat-spark { display: block; flex-shrink: 0; }
.pt-cat-vel { font-size: 11px; color: var(--pt-fg-3); }

.pt-cat-cell-cover .mono.is-warn  { color: var(--pt-warn); font-weight: 500; }
.pt-cat-cell-cover .mono.is-zero  { color: var(--pt-danger); font-weight: 500; }

.pt-cat-cell-price, .pt-cat-cell-margin {
  font-size: 12px; color: var(--pt-fg-2);
}
.pt-cat-cell-margin { color: var(--pt-fg-3); }

/* Detail panel */
.pt-cat-detail {
  overflow-y: auto;
  padding: 18px 20px 24px;
  display: flex; flex-direction: column; gap: 14px;
  background: var(--pt-bg);
  min-width: 0;
}
.pt-cat-detail-hd { display: flex; align-items: flex-start; gap: 12px; }
.pt-cat-detail-hd > div:first-child { flex: 1; }
.pt-cat-detail-hd h2 {
  font-size: 17px; font-weight: 600; letter-spacing: -0.015em;
  margin: 6px 0 2px;
}
.pt-cat-detail-hd .pt-cat-cat-pill { display: inline-block; }
.pt-cat-detail-actions { display: flex; gap: 6px; }

.pt-cat-note {
  display: flex; align-items: flex-start; gap: 8px;
  padding: 9px 12px;
  border-radius: 6px;
  font-size: 12px; line-height: 1.5;
  background: var(--pt-bg-side);
  border: 0.5px solid var(--pt-line);
  color: var(--pt-fg-2);
}
.pt-cat-note-dot { width: 6px; height: 6px; border-radius: 50%; background: var(--pt-fg-4); margin-top: 6px; flex-shrink: 0; }
.pt-cat-note-low      { background: oklch(0.97 0.03 65); border-color: oklch(0.85 0.06 65); }
.pt-cat-note-low .pt-cat-note-dot { background: var(--pt-warn); }
.pt-cat-note-critical { background: oklch(0.97 0.03 25); border-color: oklch(0.85 0.08 25); }
.pt-cat-note-critical .pt-cat-note-dot { background: var(--pt-danger); }
.pt-cat-note-oos      { background: var(--pt-bg-side); border-color: var(--pt-line); }
.pt-cat-note-oos .pt-cat-note-dot { background: var(--pt-fg-3); }

.pt-cat-stat-grid {
  display: grid; grid-template-columns: repeat(2, 1fr);
  gap: 10px;
}
.pt-cat-stat {
  background: var(--pt-surface);
  border-radius: var(--pt-radius);
  padding: 12px 14px;
  box-shadow: var(--pt-shadow-card);
  display: flex; flex-direction: column; gap: 6px;
}
.pt-cat-stat .lbl {
  font-size: 10px; color: var(--pt-fg-4); font-weight: 500;
  text-transform: uppercase; letter-spacing: 0.05em;
}
.pt-cat-stat .val {
  font-size: 22px; font-weight: 600;
  letter-spacing: -0.015em;
  font-variant-numeric: tabular-nums;
}
.pt-cat-stat .val .u { font-size: 10px; color: var(--pt-fg-4); font-weight: 400; margin-left: 4px; letter-spacing: 0; }
.pt-cat-stat .val.is-warn  { color: var(--pt-warn); }
.pt-cat-stat .val.is-zero  { color: var(--pt-danger); }
.pt-cat-stat-sub { font-size: 10.5px; color: var(--pt-fg-4); }

.pt-cat-section { margin-top: 0; }

/* Batches table */
.pt-cat-batches { width: 100%; border-collapse: collapse; }
.pt-cat-batches th, .pt-cat-batches td {
  padding: 8px 12px; text-align: left;
  font-size: 11.5px;
  border-top: 0.5px solid var(--pt-line-soft);
}
.pt-cat-batches th {
  border-top: 0; border-bottom: 0.5px solid var(--pt-line);
  font-size: 10.5px; font-weight: 500; color: var(--pt-fg-4);
  text-transform: uppercase; letter-spacing: 0.04em;
}
.pt-cat-batch-sold { display: flex; flex-direction: column; gap: 3px; }
.pt-cat-batch-bar {
  height: 3px; border-radius: 2px;
  background: oklch(from var(--pt-fg) l c h / 0.07);
  overflow: hidden;
}
.pt-cat-batch-fill { height: 100%; background: var(--pt-accent); border-radius: 2px; }
.pt-cat-coa {
  display: inline-flex; align-items: center; gap: 4px;
  font-size: 10.5px; color: var(--pt-fg-4);
}
.pt-cat-coa.is-on { color: var(--pt-ok); }

.pt-cat-empty {
  padding: 14px; display: flex; align-items: center; justify-content: space-between;
  font-size: 12px; color: var(--pt-fg-3);
}

/* Affinity */
.pt-cat-affinity-body { padding: 10px 14px; display: flex; flex-direction: column; gap: 6px; }
.pt-cat-aff {
  display: grid; grid-template-columns: auto 1fr auto;
  align-items: center; gap: 10px;
  padding: 8px 10px;
  border-radius: 6px;
  background: var(--pt-bg-side);
  border: 0.5px solid var(--pt-line-soft);
}
.pt-cat-aff-name { font-size: 12px; font-weight: 500; }
.pt-cat-aff-sub { font-size: 10.5px; color: var(--pt-fg-4); margin-top: 2px; }
.pt-cat-aff-stock { font-size: 12px; color: var(--pt-fg-3); }
.pt-cat-aff-stock.is-low { color: var(--pt-warn); }



/* ===== vault.css ===== */
/* vault.css */
.pt-vt { height: calc(100vh - 48px); display: flex; flex-direction: column; overflow: hidden; }

.pt-vt-hd {
  display: flex; align-items: flex-start; gap: 14px;
  padding: 18px 22px 12px;
  border-bottom: 0.5px solid var(--pt-line);
}
.pt-vt-hd > div:first-child { flex: 1; }
.pt-vt-hd h1 { font-size: 18px; font-weight: 600; letter-spacing: -0.015em; margin: 0; }
.pt-vt-hd p { font-size: 12px; color: var(--pt-fg-3); margin: 2px 0 0; }
.pt-vt-hd-actions { display: flex; gap: 8px; }

.pt-vt-body { flex: 1; min-height: 0; overflow-y: auto; padding: 16px 22px 22px; }

/* ─── Balance cards ─── */
.pt-vt-balances {
  display: grid; grid-template-columns: repeat(4, 1fr); gap: 10px;
  margin-bottom: 16px;
}
.pt-vt-bal {
  background: var(--pt-surface);
  border: 0.5px solid var(--pt-line);
  border-radius: var(--pt-radius);
  padding: 12px 14px;
  text-align: left;
  cursor: pointer;
  display: flex; flex-direction: column; gap: 6px;
  font-family: inherit;
  color: inherit;
  box-shadow: var(--pt-shadow-card);
  transition: border-color 0.12s, transform 0.12s;
}
.pt-vt-bal:hover { border-color: oklch(from var(--pt-fg) l c h / 0.18); }
.pt-vt-bal.is-active {
  border-color: var(--pt-accent);
  box-shadow: 0 0 0 1px var(--pt-accent), var(--pt-shadow-card);
}

.pt-vt-bal-hd { display: flex; align-items: center; gap: 8px; }
.pt-vt-bal-chain { font-size: 10px; color: var(--pt-fg-4); text-transform: uppercase; letter-spacing: 0.04em; }

.pt-vt-bal-num { font-size: 19px; font-weight: 600; letter-spacing: -0.015em; line-height: 1.1; font-variant-numeric: tabular-nums; }
.pt-vt-bal-num span { font-size: 11px; color: var(--pt-fg-4); font-weight: 400; margin-left: 3px; }
.pt-vt-bal-usd { font-size: 11.5px; color: var(--pt-fg-3); }

.pt-vt-bal-foot { display: flex; align-items: flex-end; justify-content: space-between; gap: 8px; margin-top: 2px; }
.pt-vt-bal-delta { font-size: 11px; display: flex; align-items: center; gap: 4px; }
.pt-vt-bal-delta.is-up   { color: var(--pt-ok); }
.pt-vt-bal-delta.is-down { color: var(--pt-danger); }
.pt-vt-bal-delta-pct { color: var(--pt-fg-4); margin-left: 1px; }
.pt-vt-bal-spark { flex-shrink: 0; opacity: 0.85; }

/* ─── Two-column grid ─── */
.pt-vt-grid {
  display: grid;
  grid-template-columns: minmax(0, 0.95fr) minmax(0, 1.4fr);
  gap: 14px;
  align-items: flex-start;
}

/* ─── Wallets ─── */
.pt-vt-tabs {
  display: flex; border: 0.5px solid var(--pt-line);
  border-radius: 5px; overflow: hidden;
  background: var(--pt-bg);
}
.pt-vt-tab {
  background: transparent; border: 0; padding: 4px 10px;
  font-size: 11.5px; color: var(--pt-fg-3); cursor: pointer;
  font-family: inherit;
}
.pt-vt-tab:hover { background: var(--pt-bg-side); }
.pt-vt-tab.is-active { background: var(--pt-surface); color: var(--pt-fg); font-weight: 500; }

.pt-vt-wlist { list-style: none; margin: 0; padding: 0; }
.pt-vt-w {
  display: grid;
  grid-template-columns: 80px minmax(0, 1.2fr) minmax(0, 1fr) auto;
  gap: 10px;
  align-items: center;
  padding: 10px 14px;
  border-top: 0.5px solid var(--pt-line-soft);
}
.pt-vt-w:first-child { border-top: 0; }
.pt-vt-w-id { display: flex; flex-direction: column; gap: 3px; }
.pt-vt-w-chain { font-size: 9.5px; color: var(--pt-fg-4); text-transform: uppercase; letter-spacing: 0.04em; }
.pt-vt-w-addr { display: flex; align-items: center; gap: 6px; min-width: 0; }
.pt-vt-w-addr .mono {
  font-size: 11.5px; color: var(--pt-fg-2);
  overflow: hidden; text-overflow: ellipsis; white-space: nowrap;
}
.pt-vt-copy {
  display: inline-flex; align-items: center; gap: 3px;
  background: oklch(from var(--pt-fg) l c h / 0.05);
  border: 0.5px solid var(--pt-line-soft);
  border-radius: 4px;
  padding: 1px 6px;
  font-size: 10px; color: var(--pt-fg-3); cursor: pointer;
  font-family: inherit;
  flex-shrink: 0;
}
