<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Peptech — Dashboard (Print)</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet">
<style>
/* peptech.css — Linear/Attio-flavored CRM, originally drawn for Peptech */

/* ─── Tokens ─────────────────────────────────────────────────────────────── */
:root {
  --pt-accent-h: 130;
  --pt-accent-c: 0.13;
  --pt-accent-l: 0.62;
  --pt-accent: oklch(var(--pt-accent-l) var(--pt-accent-c) var(--pt-accent-h));
  --pt-accent-soft: oklch(var(--pt-accent-l) var(--pt-accent-c) var(--pt-accent-h) / 0.14);
  --pt-accent-fg:  oklch(0.32 0.08 var(--pt-accent-h));

  /* light surfaces */
  --pt-bg:        oklch(0.985 0.002 100);
  --pt-bg-side:   oklch(0.972 0.003 100);
  --pt-surface:   oklch(1    0    0);
  --pt-surface-2: oklch(0.974 0.002 100);
  --pt-line:      oklch(0.91 0.004 100);
  --pt-line-soft: oklch(0.945 0.004 100);

  --pt-fg:        oklch(0.20 0.01 100);
  --pt-fg-2:      oklch(0.40 0.01 100);
  --pt-fg-3:      oklch(0.55 0.008 100);
  --pt-fg-4:      oklch(0.68 0.006 100);

  --pt-warn:      oklch(0.72 0.13 65);
  --pt-warn-soft: oklch(0.96 0.04 65);
  --pt-cool:      oklch(0.62 0.10 240);
  --pt-cool-soft: oklch(0.965 0.025 240);
  --pt-ok:        oklch(0.62 0.13 145);
  --pt-ok-soft:   oklch(0.965 0.04 145);
  --pt-danger:    oklch(0.60 0.18 25);

  /* channel colors */
  --pt-wa:  oklch(0.62 0.13 150);
  --pt-tg:  oklch(0.66 0.13 240);
  --pt-em:  oklch(0.55 0.02 280);

  --pt-radius: 8px;
  --pt-radius-sm: 6px;
  --pt-radius-lg: 12px;
  --pt-shadow: 0 1px 0 rgba(20,20,20,.04), 0 1px 2px rgba(20,20,20,.04);
  --pt-shadow-card: 0 0 0 0.5px oklch(0.9 0.005 100), 0 1px 0 oklch(0.96 0.004 100);

  --pt-font: "Inter", "IBM Plex Sans", ui-sans-serif, system-ui, -apple-system, sans-serif;
  --pt-mono: "JetBrains Mono", ui-monospace, "SFMono-Regular", Menlo, monospace;

  /* density */
  --pt-row-h: 44px;
  --pt-pad: 14px;
  --pt-gap: 12px;
}

.pt-d-compact { --pt-row-h: 36px; --pt-pad: 10px; --pt-gap: 8px; }
.pt-d-comfy   { --pt-row-h: 52px; --pt-pad: 18px; --pt-gap: 16px; }

.pt-th-dim {
  --pt-bg:        oklch(0.22 0.005 250);
  --pt-bg-side:   oklch(0.20 0.005 250);
  --pt-surface:   oklch(0.245 0.005 250);
  --pt-surface-2: oklch(0.225 0.005 250);
  --pt-line:      oklch(0.32 0.006 250);
  --pt-line-soft: oklch(0.27 0.006 250);
  --pt-fg:        oklch(0.95 0.005 250);
  --pt-fg-2:      oklch(0.78 0.005 250);
  --pt-fg-3:      oklch(0.62 0.005 250);
  --pt-fg-4:      oklch(0.50 0.005 250);
  --pt-warn-soft: oklch(0.32 0.04 65);
  --pt-cool-soft: oklch(0.30 0.04 240);
  --pt-ok-soft:   oklch(0.30 0.04 145);
  --pt-shadow-card: 0 0 0 0.5px oklch(0.32 0.006 250), 0 1px 0 oklch(0.27 0.006 250);
}
.pt-th-dark {
  --pt-bg:        oklch(0.13 0.004 260);
  --pt-bg-side:   oklch(0.115 0.004 260);
  --pt-surface:   oklch(0.155 0.004 260);
  --pt-surface-2: oklch(0.135 0.004 260);
  --pt-line:      oklch(0.24 0.005 260);
  --pt-line-soft: oklch(0.19 0.004 260);
  --pt-fg:        oklch(0.96 0.005 260);
  --pt-fg-2:      oklch(0.76 0.005 260);
  --pt-fg-3:      oklch(0.58 0.005 260);
  --pt-fg-4:      oklch(0.45 0.005 260);
  --pt-warn-soft: oklch(0.26 0.05 65);
  --pt-cool-soft: oklch(0.24 0.05 240);
  --pt-ok-soft:   oklch(0.24 0.05 145);
  --pt-shadow-card: 0 0 0 0.5px oklch(0.24 0.005 260), 0 1px 0 oklch(0.18 0.004 260);
}

/* ─── Base ───────────────────────────────────────────────────────────────── */
* { box-sizing: border-box; }
html, body, #root { height: 100%; margin: 0; }
body {
  font-family: var(--pt-font);
  font-size: 13px;
  line-height: 1.45;
  color: var(--pt-fg);
  background: var(--pt-bg);
  -webkit-font-smoothing: antialiased;
  font-feature-settings: "cv11","ss01","ss03";
}
button { font-family: inherit; }
.mono { font-family: var(--pt-mono); font-feature-settings: "tnum"; letter-spacing: -0.01em; }
kbd {
  font-family: var(--pt-mono); font-size: 10px;
  padding: 1px 5px; border-radius: 4px;
  background: oklch(from var(--pt-fg) l c h / 0.06);
  color: var(--pt-fg-3);
}

/* ─── Layout shell ───────────────────────────────────────────────────────── */
.pt-root {
  display: grid;
  grid-template-columns: 232px 1fr 320px;
  height: 100%;
  background: var(--pt-bg);
  color: var(--pt-fg);
}
.pt-root.no-right { grid-template-columns: 232px 1fr; }
.pt-d-compact .pt-root { grid-template-columns: 220px 1fr 296px; }

/* ─── Sidebar ────────────────────────────────────────────────────────────── */
.pt-sidebar {
  background: var(--pt-bg-side);
  border-right: 0.5px solid var(--pt-line);
  display: flex; flex-direction: column;
  padding: 10px 8px;
  min-height: 0;
}
.pt-brand {
  display: flex; align-items: center; gap: 8px;
  padding: 6px 6px 10px;
}
.pt-brand-mark {
  width: 22px; height: 22px;
  border-radius: 6px;
  background: var(--pt-fg);
  color: var(--pt-bg);
  display: grid; place-items: center;
}
.pt-brand-name {
  font-weight: 600; font-size: 13.5px; letter-spacing: -0.01em;
  flex: 1;
}
.pt-brand-name span { color: var(--pt-accent); }
.pt-brand-menu {
  appearance: none; border: 0; background: transparent; color: var(--pt-fg-3);
  width: 22px; height: 22px; border-radius: 5px; display: grid; place-items: center;
  cursor: pointer;
}
.pt-brand-menu:hover { background: oklch(from var(--pt-fg) l c h / 0.06); color: var(--pt-fg); }

.pt-compose, .pt-search {
  display: flex; align-items: center; gap: 8px;
  margin: 2px 4px 6px;
  padding: 0 9px; height: 30px;
  border: 0.5px solid var(--pt-line);
  border-radius: var(--pt-radius);
  background: var(--pt-surface);
  color: var(--pt-fg-2);
  font-size: 12.5px;
  cursor: pointer;
}
.pt-compose { color: var(--pt-fg); font-weight: 500; }
.pt-compose svg { color: var(--pt-accent-fg); }
.pt-compose span { flex: 1; text-align: left; }
.pt-compose:hover { background: var(--pt-surface-2); }
.pt-search:hover { background: var(--pt-surface-2); }
.pt-search span { flex: 1; text-align: left; color: var(--pt-fg-3); }

.pt-nav {
  display: flex; flex-direction: column; gap: 1px;
  padding: 6px 0;
  flex: 1;
  overflow-y: auto;
  min-height: 0;
}
.pt-nav-item {
  display: flex; align-items: center; gap: 9px;
  padding: 0 9px; height: 28px;
  border-radius: 6px;
  background: transparent; border: 0; color: var(--pt-fg-2);
  font-size: 12.5px;
  cursor: pointer;
  text-align: left;
}
.pt-nav-item:hover { background: oklch(from var(--pt-fg) l c h / 0.05); color: var(--pt-fg); }
.pt-nav-item.is-on {
  background: oklch(from var(--pt-fg) l c h / 0.07);
  color: var(--pt-fg);
  font-weight: 500;
}
.pt-nav-item.is-on svg { color: var(--pt-accent-fg); }
.pt-nav-label { flex: 1; }
.pt-nav-badge {
  font-family: var(--pt-mono); font-size: 10px;
  padding: 1px 5px; border-radius: 4px;
  background: var(--pt-accent-soft);
  color: var(--pt-accent-fg);
  font-weight: 500;
}
.pt-nav-sep {
  height: 1px; background: var(--pt-line-soft);
  margin: 8px 8px;
}
.pt-nav-section {
  font-size: 10.5px; text-transform: uppercase; letter-spacing: 0.06em;
  color: var(--pt-fg-4);
  padding: 2px 9px 4px;
  display: flex; justify-content: space-between;
}
.pt-pin {
  display: flex; align-items: center; gap: 8px;
  padding: 0 9px; height: 36px;
  background: transparent; border: 0; cursor: pointer;
  border-radius: 6px;
  text-align: left;
  color: var(--pt-fg-2);
}
.pt-pin:hover { background: oklch(from var(--pt-fg) l c h / 0.05); }
.pt-pin svg { color: var(--pt-fg-3); }
.pt-pin-body { flex: 1; min-width: 0; }
.pt-pin-name { font-size: 12px; color: var(--pt-fg); font-weight: 500; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
.pt-pin-snip { font-size: 11px; color: var(--pt-fg-3); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
.pt-pin-unread {
  font-family: var(--pt-mono); font-size: 10px;
  background: var(--pt-accent); color: oklch(0.18 0.02 var(--pt-accent-h));
  border-radius: 999px; padding: 1px 5px; font-weight: 600;
}

.pt-side-foot {
  border-top: 0.5px solid var(--pt-line-soft);
  margin: 6px -8px -10px;
  padding: 8px 10px;
}
.pt-me { display: flex; align-items: center; gap: 8px; padding: 4px; border-radius: 6px; }
.pt-me:hover { background: oklch(from var(--pt-fg) l c h / 0.05); }
.pt-me-av {
  width: 26px; height: 26px; border-radius: 6px;
  background: var(--pt-accent-soft);
  color: var(--pt-accent-fg);
  display: grid; place-items: center;
  font-size: 11px; font-weight: 600;
}
.pt-me-info { flex: 1; min-width: 0; }
.pt-me-name { font-size: 12px; font-weight: 500; }
.pt-me-status { font-size: 10.5px; color: var(--pt-fg-3); display: flex; align-items: center; gap: 5px; }
.pt-dot { width: 6px; height: 6px; border-radius: 50%; background: var(--pt-ok); display: inline-block; }
.pt-dot-ok { background: var(--pt-ok); }
.pt-dot-warn { background: var(--pt-warn); }
.pt-dot-cool { background: var(--pt-cool); }
.pt-me-more {
  background: transparent; border: 0; color: var(--pt-fg-3);
  width: 22px; height: 22px; border-radius: 5px; cursor: pointer;
}
.pt-me-more:hover { background: oklch(from var(--pt-fg) l c h / 0.06); color: var(--pt-fg); }

/* ─── Main column ────────────────────────────────────────────────────────── */
.pt-main { min-width: 0; display: flex; flex-direction: column; min-height: 0; }
.pt-top {
  display: flex; align-items: center; gap: 16px;
  height: 48px; padding: 0 18px;
  border-bottom: 0.5px solid var(--pt-line);
  background: var(--pt-bg);
  flex-shrink: 0;
}
.pt-top-crumbs {
  display: flex; align-items: center; gap: 6px;
  font-size: 12px;
}
.pt-crumb-home { color: var(--pt-fg-3); }
.pt-crumb-sep { color: var(--pt-fg-4); }
.pt-crumb-now { color: var(--pt-fg); font-weight: 500; }
.pt-top-mid {
  flex: 1;
  display: flex; gap: 6px;
  justify-content: center;
}
.pt-chip {
  display: inline-flex; align-items: center; gap: 6px;
  padding: 3px 9px 3px 8px;
  border-radius: 999px;
  border: 0.5px solid var(--pt-line);
  background: var(--pt-surface);
  font-size: 11px;
  color: var(--pt-fg-2);
}
.pt-chip-wa svg { color: var(--pt-wa); }
.pt-chip-tg svg { color: var(--pt-tg); }
.pt-chip-em svg { color: var(--pt-em); }
.pt-chip-dot { width: 6px; height: 6px; border-radius: 50%; background: var(--pt-ok); margin-left: 2px; }
.pt-top-actions { display: flex; align-items: center; gap: 4px; }
.pt-iconbtn {
  position: relative;
  width: 28px; height: 28px;
  display: grid; place-items: center;
  background: transparent; border: 0;
  color: var(--pt-fg-2); border-radius: 6px; cursor: pointer;
}
.pt-iconbtn:hover { background: oklch(from var(--pt-fg) l c h / 0.06); color: var(--pt-fg); }
.pt-iconbtn.is-on { background: var(--pt-accent-soft); color: var(--pt-accent-fg); }
.pt-iconbtn-dot {
  position: absolute; top: 6px; right: 6px;
  width: 6px; height: 6px; border-radius: 50%;
  background: var(--pt-warn);
  box-shadow: 0 0 0 1.5px var(--pt-bg);
}
.pt-top-divider { width: 1px; height: 16px; background: var(--pt-line); margin: 0 4px; }
.pt-cta {
  height: 28px; padding: 0 12px;
  background: var(--pt-fg); color: var(--pt-bg);
  border: 0; border-radius: 6px; cursor: pointer;
  font-size: 12px; font-weight: 500;
}
.pt-cta:hover { background: oklch(from var(--pt-fg) calc(l - 0.05) c h); }

/* ─── Page ───────────────────────────────────────────────────────────────── */
.pt-page {
  flex: 1; min-height: 0;
  overflow-y: auto;
  padding: 22px 22px 32px;
}
.pt-page-hd {
  display: flex; justify-content: space-between; align-items: flex-end;
  margin-bottom: 18px;
}
.pt-page-hd h1 {
  margin: 0; font-size: 22px; font-weight: 600; letter-spacing: -0.018em;
}
.pt-page-hd p {
  margin: 3px 0 0; color: var(--pt-fg-3); font-size: 13px;
}
.pt-page-actions { display: flex; gap: 8px; }
.pt-btn {
  display: inline-flex; align-items: center; gap: 6px;
  height: 30px; padding: 0 12px;
  border-radius: 7px;
  font-size: 12.5px; font-weight: 500;
  cursor: pointer;
  border: 0.5px solid var(--pt-line);
  background: var(--pt-surface);
  color: var(--pt-fg);
  white-space: nowrap;
}
.pt-btn-ghost { background: transparent; }
.pt-btn-primary {
  background: var(--pt-fg); color: var(--pt-bg); border-color: transparent;
}

/* ─── KPIs ───────────────────────────────────────────────────────────────── */
.pt-kpis {
  display: grid; grid-template-columns: repeat(4, 1fr);
  gap: var(--pt-gap);
  margin-bottom: var(--pt-gap);
}
.pt-kpi {
  background: var(--pt-surface);
  border-radius: var(--pt-radius);
  padding: 12px 14px 13px;
  box-shadow: var(--pt-shadow-card);
}
.pt-kpi-lbl { font-size: 11px; color: var(--pt-fg-3); text-transform: uppercase; letter-spacing: 0.05em; font-weight: 500; }
.pt-kpi-val-row { display: flex; align-items: baseline; gap: 10px; margin-top: 4px; }
.pt-kpi-val { font-size: 22px; font-weight: 600; letter-spacing: -0.02em; font-variant-numeric: tabular-nums; }
.pt-kpi-delta { font-size: 11px; font-family: var(--pt-mono); }
.pt-kpi-delta.up { color: var(--pt-ok); }
.pt-kpi-delta.dn { color: var(--pt-danger); }
.pt-spark { margin-left: auto; }
.pt-kpi-sub { font-size: 11.5px; color: var(--pt-fg-3); margin-top: 3px; }

/* ─── Card grid ──────────────────────────────────────────────────────────── */
.pt-grid {
  display: grid;
  grid-template-columns: repeat(3, 1fr);
  grid-auto-rows: minmax(280px, auto);
  gap: var(--pt-gap);
}
.pt-span-2 { grid-column: span 2; grid-row: span 2; }
.pt-card {
  background: var(--pt-surface);
  border-radius: var(--pt-radius);
  box-shadow: var(--pt-shadow-card);
  display: flex; flex-direction: column;
  min-height: 0;
  overflow: hidden;
}
.pt-card-hd {
  display: flex; justify-content: space-between; align-items: flex-start;
  padding: 12px 14px 10px;
  gap: 10px;
}
.pt-card-hd h3 { margin: 0; font-size: 13px; font-weight: 600; letter-spacing: -0.01em; }
.pt-card-hd p  { margin: 1px 0 0; font-size: 11.5px; color: var(--pt-fg-3); }
.pt-card-body { padding: 0 4px 10px; flex: 1; min-height: 0; }
.pt-card-body.is-scroll { overflow-y: auto; }
.pt-card-ft {
  border-top: 0.5px solid var(--pt-line-soft);
  padding: 8px 14px; font-size: 11.5px; color: var(--pt-fg-3);
}
.pt-link {
  background: transparent; border: 0;
  font-size: 11.5px; color: var(--pt-fg-2); cursor: pointer;
  font-weight: 500;
}
.pt-link:hover { color: var(--pt-fg); }

.pt-pillbar { display: flex; gap: 2px; background: oklch(from var(--pt-fg) l c h / 0.05); border-radius: 7px; padding: 2px; }
.pt-pill {
  display: inline-flex; align-items: center; gap: 5px;
  padding: 3px 8px;
  background: transparent; border: 0; border-radius: 5px;
  font-size: 11px; color: var(--pt-fg-2); cursor: pointer;
}
.pt-pill.is-on { background: var(--pt-surface); color: var(--pt-fg); box-shadow: 0 0 0 0.5px var(--pt-line); }
.pt-pill-num { font-family: var(--pt-mono); font-size: 10px; color: var(--pt-fg-3); }
.pt-pill.is-on .pt-pill-num { color: var(--pt-accent-fg); }

.pt-segctl { display: flex; gap: 0; background: oklch(from var(--pt-fg) l c h / 0.05); border-radius: 6px; padding: 2px; }
.pt-segctl button {
  appearance: none; border: 0; background: transparent;
  font-size: 11px; padding: 2px 9px; border-radius: 4px;
  color: var(--pt-fg-2); cursor: pointer; font-family: var(--pt-mono);
}
.pt-segctl button.is-on { background: var(--pt-surface); color: var(--pt-fg); box-shadow: 0 0 0 0.5px var(--pt-line); }

/* ─── Inbox / threads ────────────────────────────────────────────────────── */
.pt-thread-list { list-style: none; margin: 0; padding: 0; }
.pt-thread {
  display: grid; grid-template-columns: 32px 1fr auto;
  align-items: center; gap: 10px;
  padding: 9px 12px;
  cursor: pointer;
  border-top: 0.5px solid var(--pt-line-soft);
  position: relative;
}
.pt-thread:first-child { border-top: 0; }
.pt-thread:hover { background: oklch(from var(--pt-fg) l c h / 0.025); }
.pt-thread.is-active {
  background: var(--pt-accent-soft);
}
.pt-thread.is-active::before {
  content: ""; position: absolute; left: 0; top: 6px; bottom: 6px; width: 2px;
  background: var(--pt-accent); border-radius: 2px;
}
.pt-thread-av {
  position: relative;
  width: 32px; height: 32px; border-radius: 7px;
  background: var(--pt-surface-2);
  display: grid; place-items: center;
  font-size: 11px; font-weight: 600; color: var(--pt-fg-2);
  border: 0.5px solid var(--pt-line);
}
.pt-thread-av[data-channel="wa"] { color: var(--pt-wa); }
.pt-thread-av[data-channel="tg"] { color: var(--pt-tg); }
.pt-thread-av[data-channel="em"] { color: var(--pt-em); }
.pt-thread-ch {
  position: absolute; right: -3px; bottom: -3px;
  width: 14px; height: 14px;
  background: var(--pt-bg); border-radius: 50%;
  display: grid; place-items: center;
}
.pt-ch-wa { color: var(--pt-wa); }
.pt-ch-tg { color: var(--pt-tg); }
.pt-ch-em { color: var(--pt-em); }
.pt-thread-mid { min-width: 0; overflow: hidden; }
.pt-thread-row1 { display: flex; align-items: center; gap: 6px; min-width: 0; }
.pt-thread-name { font-size: 12.5px; font-weight: 500; color: var(--pt-fg); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; flex-shrink: 1; min-width: 0; }
.pt-thread.is-unread .pt-thread-name { font-weight: 600; }
.pt-thread-snip {
  font-size: 12px; color: var(--pt-fg-3);
  white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
  margin-top: 1px;
}
.pt-thread.is-unread .pt-thread-snip { color: var(--pt-fg-2); }
.pt-thread-meta { display: flex; flex-direction: column; align-items: flex-end; gap: 4px; }
.pt-thread-time { font-size: 10.5px; color: var(--pt-fg-4); font-family: var(--pt-mono); }
.pt-thread-unread {
  background: var(--pt-accent); color: oklch(0.18 0.02 var(--pt-accent-h));
  font-family: var(--pt-mono); font-size: 10px; font-weight: 600;
  border-radius: 999px; padding: 1px 6px; min-width: 18px; text-align: center;
}

/* tags */
.pt-tag {
  font-size: 10px;
  padding: 1px 6px; border-radius: 4px;
  background: oklch(from var(--pt-fg) l c h / 0.07);
  color: var(--pt-fg-2);
  font-weight: 500;
  letter-spacing: 0.01em;
}
.pt-tag-soft { background: oklch(from var(--pt-fg) l c h / 0.04); color: var(--pt-fg-3); }
.pt-tag-vip { background: var(--pt-accent-soft); color: var(--pt-accent-fg); }

// ── useTweaks ───────────────────────────────────────────────────────────────
// Single source of truth for tweak values. setTweak persists via the host
// (__edit_mode_set_keys → host rewrites the EDITMODE block on disk).
function useTweaks(defaults) {
  const [values, setValues] = React.useState(defaults);
  // Accepts either setTweak('key', value) or setTweak({ key: value, ... }) so a
  // useState-style call doesn't write a "[object Object]" key into the persisted
  // JSON block.
  const setTweak = React.useCallback((keyOrEdits, val) => {
    const edits = typeof keyOrEdits === 'object' && keyOrEdits !== null
      ? keyOrEdits : { [keyOrEdits]: val };
    setValues((prev) => ({ ...prev, ...edits }));
    window.parent.postMessage({ type: '__edit_mode_set_keys', edits }, '*');
  }, []);
  return [values, setTweak];
}

// ── TweaksPanel ─────────────────────────────────────────────────────────────
// Floating shell. Registers the protocol listener BEFORE announcing
// availability — if the announce ran first, the host's activate could land
// before our handler exists and the toolbar toggle would silently no-op.
// The close button posts __edit_mode_dismissed so the host's toolbar toggle
// flips off in lockstep; the host echoes __deactivate_edit_mode back which
// is what actually hides the panel.
function TweaksPanel({ title = 'Tweaks', children }) {
  const [open, setOpen] = React.useState(false);
  const dragRef = React.useRef(null);
  const offsetRef = React.useRef({ x: 16, y: 16 });
  const PAD = 16;

  const clampToViewport = React.useCallback(() => {
    const panel = dragRef.current;
    if (!panel) return;
    const w = panel.offsetWidth, h = panel.offsetHeight;
    const maxRight = Math.max(PAD, window.innerWidth - w - PAD);
    const maxBottom = Math.max(PAD, window.innerHeight - h - PAD);
    offsetRef.current = {
      x: Math.min(maxRight, Math.max(PAD, offsetRef.current.x)),
      y: Math.min(maxBottom, Math.max(PAD, offsetRef.current.y)),
    };
    panel.style.right = offsetRef.current.x + 'px';
    panel.style.bottom = offsetRef.current.y + 'px';
  }, []);

  React.useEffect(() => {
    if (!open) return;
    clampToViewport();
    if (typeof ResizeObserver === 'undefined') {
      window.addEventListener('resize', clampToViewport);
      return () => window.removeEventListener('resize', clampToViewport);
    }
    const ro = new ResizeObserver(clampToViewport);
    ro.observe(document.documentElement);
    return () => ro.disconnect();
  }, [open, clampToViewport]);

  React.useEffect(() => {
    const onMsg = (e) => {
      const t = e?.data?.type;
      if (t === '__activate_edit_mode') setOpen(true);
      else if (t === '__deactivate_edit_mode') setOpen(false);
    };
    window.addEventListener('message', onMsg);
    window.parent.postMessage({ type: '__edit_mode_available' }, '*');
    return () => window.removeEventListener('message', onMsg);
  }, []);

  const dismiss = () => {
    setOpen(false);
    window.parent.postMessage({ type: '__edit_mode_dismissed' }, '*');
  };

  const onDragStart = (e) => {
    const panel = dragRef.current;
    if (!panel) return;
    const r = panel.getBoundingClientRect();
    const sx = e.clientX, sy = e.clientY;
    const startRight = window.innerWidth - r.right;
    const startBottom = window.innerHeight - r.bottom;
    const move = (ev) => {
      offsetRef.current = {
        x: startRight - (ev.clientX - sx),
        y: startBottom - (ev.clientY - sy),
      };
      clampToViewport();
    };
    const up = () => {
      window.removeEventListener('mousemove', move);
      window.removeEventListener('mouseup', up);
    };
    window.addEventListener('mousemove', move);
    window.addEventListener('mouseup', up);
  };

  if (!open) return null;
  return (
    <>
      <style>{__TWEAKS_STYLE}</style>
      <div ref={dragRef} className="twk-panel"
           style={{ right: offsetRef.current.x, bottom: offsetRef.current.y }}>
        <div className="twk-hd" onMouseDown={onDragStart}>
          <b>{title}</b>
          <button className="twk-x" aria-label="Close tweaks"
                  onMouseDown={(e) => e.stopPropagation()}
                  onClick={dismiss}>✕</button>
        </div>
        <div className="twk-body">{children}</div>
      </div>
    </>
  );
}

// ── Layout helpers ──────────────────────────────────────────────────────────

function TweakSection({ label, children }) {
  return (
    <>
      <div className="twk-sect">{label}</div>
      {children}
    </>
  );
}

function TweakRow({ label, value, children, inline = false }) {
  return (
    <div className={inline ? 'twk-row twk-row-h' : 'twk-row'}>
      <div className="twk-lbl">
        <span>{label}</span>
        {value != null && <span className="twk-val">{value}</span>}
      </div>
      {children}
    </div>
  );
}

// ── Controls ────────────────────────────────────────────────────────────────

function TweakSlider({ label, value, min = 0, max = 100, step = 1, unit = '', onChange }) {
  return (
    <TweakRow label={label} value={`${value}${unit}`}>
      <input type="range" className="twk-slider" min={min} max={max} step={step}
             value={value} onChange={(e) => onChange(Number(e.target.value))} />
    </TweakRow>
  );
}

function TweakToggle({ label, value, onChange }) {
  return (
    <div className="twk-row twk-row-h">
      <div className="twk-lbl"><span>{label}</span></div>
      <button type="button" className="twk-toggle" data-on={value ? '1' : '0'}
              role="switch" aria-checked={!!value}
              onClick={() => onChange(!value)}><i /></button>
    </div>
  );
}

function TweakRadio({ label, value, options, onChange }) {
  const trackRef = React.useRef(null);
  const [dragging, setDragging] = React.useState(false);
  const opts = options.map((o) => (typeof o === 'object' ? o : { value: o, label: o }));
  const idx = Math.max(0, opts.findIndex((o) => o.value === value));
  const n = opts.length;

  // The active value is read by pointer-move handlers attached for the lifetime
  // of a drag — ref it so a stale closure doesn't fire onChange for every move.
  const valueRef = React.useRef(value);
  valueRef.current = value;

  const segAt = (clientX) => {
    const r = trackRef.current.getBoundingClientRect();
    const inner = r.width - 4;
    const i = Math.floor(((clientX - r.left - 2) / inner) * n);
    return opts[Math.max(0, Math.min(n - 1, i))].value;
  };

  const onPointerDown = (e) => {
    setDragging(true);
    const v0 = segAt(e.clientX);
    if (v0 !== valueRef.current) onChange(v0);
    const move = (ev) => {
      if (!trackRef.current) return;
      const v = segAt(ev.clientX);
      if (v !== valueRef.current) onChange(v);
    };
    const up = () => {
      setDragging(false);
      window.removeEventListener('pointermove', move);
      window.removeEventListener('pointerup', up);
    };
    window.addEventListener('pointermove', move);
    window.addEventListener('pointerup', up);
  };

  return (
    <TweakRow label={label}>
      <div ref={trackRef} role="radiogroup" onPointerDown={onPointerDown}
           className={dragging ? 'twk-seg dragging' : 'twk-seg'}>
        <div className="twk-seg-thumb"
             style={{ left: `calc(2px + ${idx} * (100% - 4px) / ${n})`,
                      width: `calc((100% - 4px) / ${n})` }} />
        {opts.map((o) => (
          <button key={o.value} type="button" role="radio" aria-checked={o.value === value}>
            {o.label}
          </button>
        ))}
      </div>
    </TweakRow>
  );
}

function TweakSelect({ label, value, options, onChange }) {
  return (
    <TweakRow label={label}>
      <select className="twk-field" value={value} onChange={(e) => onChange(e.target.value)}>
        {options.map((o) => {
          const v = typeof o === 'object' ? o.value : o;
          const l = typeof o === 'object' ? o.label : o;
          return <option key={v} value={v}>{l}</option>;
        })}
      </select>
    </TweakRow>
  );
}

function TweakText({ label, value, placeholder, onChange }) {
  return (
    <TweakRow label={label}>
      <input className="twk-field" type="text" value={value} placeholder={placeholder}
             onChange={(e) => onChange(e.target.value)} />
    </TweakRow>
  );
}

function TweakNumber({ label, value, min, max, step = 1, unit = '', onChange }) {
  const clamp = (n) => {
    if (min != null && n < min) return min;
    if (max != null && n > max) return max;
    return n;
  };
  const startRef = React.useRef({ x: 0, val: 0 });
  const onScrubStart = (e) => {
    e.preventDefault();
    startRef.current = { x: e.clientX, val: value };
    const decimals = (String(step).split('.')[1] || '').length;
    const move = (ev) => {
      const dx = ev.clientX - startRef.current.x;
      const raw = startRef.current.val + dx * step;
      const snapped = Math.round(raw / step) * step;
      onChange(clamp(Number(snapped.toFixed(decimals))));
    };
    const up = () => {
      window.removeEventListener('pointermove', move);
      window.removeEventListener('pointerup', up);
    };
    window.addEventListener('pointermove', move);
    window.addEventListener('pointerup', up);
  };
  return (
    <div className="twk-num">
      <span className="twk-num-lbl" onPointerDown={onScrubStart}>{label}</span>
      <input type="number" value={value} min={min} max={max} step={step}
             onChange={(e) => onChange(clamp(Number(e.target.value)))} />
      {unit && <span className="twk-num-unit">{unit}</span>}
    </div>
  );
}

function TweakColor({ label, value, onChange }) {
  return (
    <div className="twk-row twk-row-h">
      <div className="twk-lbl"><span>{label}</span></div>
      <input type="color" className="twk-swatch" value={value}
             onChange={(e) => onChange(e.target.value)} />
    </div>
  );
}

function TweakButton({ label, onClick, secondary = false }) {
  return (
    <button type="button" className={secondary ? 'twk-btn secondary' : 'twk-btn'}
            onClick={onClick}>{label}</button>
  );
}

Object.assign(window, {
  useTweaks, TweaksPanel, TweakSection, TweakRow,
  TweakSlider, TweakToggle, TweakRadio, TweakSelect,
  TweakText, TweakNumber, TweakColor, TweakButton,
});

              <span className={`pt-kpi-delta ${k.delta >= 0 ? "up" : "dn"}`}>
                {k.delta >= 0 ? "▲" : "▼"} {Math.abs(k.delta)}%
              </span>
            )}
            {k.spark && <PtSpark data={k.spark} />}
          </div>
          {k.sub && <div className="pt-kpi-sub">{k.sub}</div>}
        </div>

function PtSpark({ data }) {
  const max = Math.max(...data), min = Math.min(...data);
  const w = 56, h = 18;
  const pts = data.map((v, i) => {
    const x = (i / (data.length - 1)) * w;
    const y = h - ((v - min) / Math.max(1, max - min)) * h;
    return `${x.toFixed(1)},${y.toFixed(1)}`;
  }).join(" ");
  return (
    <svg width={w} height={h} viewBox={`0 0 ${w} ${h}`} className="pt-spark">
      <polyline points={pts} fill="none" stroke="var(--pt-accent)" strokeWidth="1.25"
                strokeLinecap="round" strokeLinejoin="round"/>
    </svg>
  );
}

}

  );
}

Object.assign(window, {
  PtKpiRow, PtCard, PtInboxCard, PtPaymentsCard, PtReordersCard,
  PtStockCard, PtRevenueCard, PtShipmentsCard, PtRightRail,
});


/* ───── app.jsx ───── */
// app.jsx — main composition

const TWEAK_DEFAULTS = /*EDITMODE-BEGIN*/{
  "theme": "light",
  "accent": "acid",
  "density": "regular",
  "rightRail": true
}/*EDITMODE-END*/;

function PtApp() {
  const [t, setTweak] = useTweaks(TWEAK_DEFAULTS);
  const [active, setActive] = React.useState("home");
  const [activeThread, setActiveThread] = React.useState("t01");
  const [confirmed, setConfirmed] = React.useState({});

  const onConfirm = (id) => setConfirmed((p) => ({ ...p, [id]: true }));
  const payments = window.PT_PAYMENTS.map((p) =>
    confirmed[p.id] ? { ...p, state: "confirmed" } : p);

  const accent = window.PT_ACCENTS[t.accent] || window.PT_ACCENTS.acid;
  const sectionLabel = ({
    home: "Dashboard", inbox: "Inbox", customers: "Customers",
    orders: "Orders", catalog: "Catalog", broadcasts: "Broadcasts",
    automations: "Automations", vault: "Vault",
  })[active];

  return (
    <div className={`pt-root pt-th-${t.theme} pt-d-${t.density} ${t.rightRail ? "" : "no-right"}`}
         style={{ "--pt-accent-h": accent.h }}>
      <PtSidebar active={active} onNav={setActive} density={t.density} />
      <main className="pt-main">
        <PtTopBar
          section={sectionLabel}
          rightOpen={t.rightRail}
          onRightToggle={() => setTweak("rightRail", !t.rightRail)}
        />
        <div className="pt-page">
          <div className="pt-page-hd">
            <div>
              <h1>Tuesday afternoon, dr_peptide.</h1>
              <p>23 active threads · 7 need a reply · 3 reorders due in &lt;48h</p>
            </div>
            <div className="pt-page-actions">
              <button className="pt-btn pt-btn-ghost">Daily summary</button>
              <button className="pt-btn pt-btn-primary">
                <window.I.zap size={12}/> Run morning checks
              </button>
            </div>
          </div>

          <PtKpiRow />

          <div className="pt-grid">
            <PtInboxCard
              threads={window.PT_THREADS}
              activeId={activeThread}
              onSelect={setActiveThread}
            />
            <PtPaymentsCard payments={payments} onConfirm={onConfirm} />
            <PtRevenueCard data={window.PT_REVENUE_7D} />
            <PtReordersCard reorders={window.PT_REORDERS} />
            <PtStockCard products={window.PT_PRODUCTS} />
            <PtShipmentsCard shipments={window.PT_SHIPMENTS} />
          </div>

          <footer className="pt-foot">
            <span className="mono">v0.4.2 · last sync 14s ago</span>
            <span className="pt-foot-mid">For research use only · Not for human consumption.</span>
            <span className="mono">⌘K to search · ⌘N new msg</span>
          </footer>
        </div>
      </main>

      {t.rightRail && (
        <PtRightRail activeThread={activeThread} threads={window.PT_THREADS} />
      )}

      <TweaksPanel title="Tweaks">
        <TweakSection label="Theme" />
        <TweakRadio label="Mode" value={t.theme}
          options={[{value:"light",label:"Light"},{value:"dim",label:"Dim"},{value:"dark",label:"Dark"}]}
          onChange={(v) => setTweak("theme", v)} />
        <TweakRadio label="Accent" value={t.accent}
          options={[
            {value:"acid",label:"Acid"},
            {value:"cobalt",label:"Cobalt"},
            {value:"ember",label:"Ember"},
            {value:"violet",label:"Violet"},
          ]}
          onChange={(v) => setTweak("accent", v)} />

        <TweakSection label="Layout" />
        <TweakRadio label="Density" value={t.density}
          options={[{value:"compact",label:"Compact"},{value:"regular",label:"Regular"},{value:"comfy",label:"Comfy"}]}
          onChange={(v) => setTweak("density", v)} />
        <TweakToggle label="Right rail" value={t.rightRail}
          onChange={(v) => setTweak("rightRail", v)} />
      </TweaksPanel>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<PtApp />);


</script>

<script>
(function () {
  var fired = false;
  function go() {
    if (fired) return; fired = true;
    setTimeout(function () { window.print(); }, 800);
  }
  function ready() {
    Promise.all([
      document.fonts ? document.fonts.ready : Promise.resolve(),
      new Promise(function (r) { setTimeout(r, 1500); })  // wait for Babel + React render
    ]).then(go);
  }
  if (document.readyState === 'complete') ready();
  else window.addEventListener('load', ready);
})();
</script>
</body>
